// ─── DATA SOURCE: Google Sheet (published as CSV) ───────────────────────────
// Expected header row (any order, case-insensitive):
// Book | PageOrder | Title | Type | Year | Premium | Published | PdfUrl | Content
//
// Book      → "second-paper" or "third-paper"
// PageOrder → 1, 2, 3 ... (controls page order inside the book)
// Type      → PYQ / Model Set / Practice Set / Special Set
// Premium   → yes/no
// Published → yes/no
// PdfUrl    → Google Drive share link to the exam PDF (optional)
// Content   → optional HTML notes shown above/below the PDF
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5svv38RZ1MJ54P73voMTXWZYuNZZeU6Hy4uWsXS95Z0BcydyeRsQINcY8gzVyKYNCeQoM8u3gs7E_/pub?output=csv";

function parseCSV(csv) {
  var lines = csv.replace(/\r/g, "").trim().split("\n");
  if (lines.length < 2) return [];
  var headers = lines[0].split(",").map(function (h) { return h.replace(/"/g, "").trim(); });
  return lines.slice(1).map(function (line) {
    var cols = [], cur = "", inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    var obj = {};
    headers.forEach(function (h, i) { obj[h] = (cols[i] || "").replace(/^"|"$/g, "").trim(); });
    return obj;
  });
}

// Turn a normal Google Drive "share" link into an embeddable preview link
function driveToPreview(url) {
  if (!url) return "";
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return "https://drive.google.com/file/d/" + m[1] + "/preview";
  return url;
}

const TRUE_VALUES = ["yes", "true", "1", "y", "published", "premium"];
function toBool(v, defaultTrue) {
  if (v === undefined || v === null || String(v).trim() === "") return !!defaultTrue;
  return TRUE_VALUES.indexOf(String(v).trim().toLowerCase()) !== -1;
}
function getField(row, names) {
  for (var i = 0; i < names.length; i++) {
    var key = Object.keys(row).find(function (k) { return k.trim().toLowerCase() === names[i].toLowerCase(); });
    if (key !== undefined && row[key] !== undefined) return row[key];
  }
  return "";
}

async function loadExamsFromSheet() {
  try {
    const res = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.indexOf("?") > -1 ? "&" : "?") + "t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text());
    if (!rows.length) return null;

    const grouped = {};
    rows.forEach(function (r, idx) {
      const book = getField(r, ["Book"]).trim();
      const title = getField(r, ["Title"]).trim();
      if (!book || !title) return;
      if (!grouped[book]) grouped[book] = [];
      const pageOrder = parseInt(getField(r, ["PageOrder", "Order"]), 10) || (grouped[book].length + 1);
      grouped[book].push({
        id: "sheet_" + book + "_" + idx,
        title: title,
        type: getField(r, ["Type"]).trim() || "Practice Set",
        year: getField(r, ["Year"]).trim() || null,
        pageOrder: pageOrder,
        isPremium: toBool(getField(r, ["Premium"]), false),
        isPublished: toBool(getField(r, ["Published"]), true),
        pdfUrl: driveToPreview(getField(r, ["PdfUrl", "PDF", "PdfLink"]).trim()),
        content: getField(r, ["Content"]).trim(),
      });
    });

    Object.keys(grouped).forEach(function (b) {
      grouped[b].sort(function (a, b2) { return a.pageOrder - b2.pageOrder; });
    });
    return grouped;
  } catch (e) {
    console.warn("Sheet load failed, using mock data:", e);
    return null;
  }
}

function App() {
  const [view, setView] = useState("library");
  const [selectedBook, setSelectedBook] = useState(null);
  const [exams, setExams] = useState(MOCK_EXAMS);
  const [usingSheet, setUsingSheet] = useState(false);
  const [sheetLoading, setSheetLoading] = useState(true);
  const [bookmarks, setBookmarks] = useState(() => {
    try { return JSON.parse(localStorage.getItem("sm_bookmarks") || "{}"); } catch { return {}; }
  });
  const [lastPage, setLastPage] = useState(() => {
    try { return JSON.parse(localStorage.getItem("sm_lastpage") || "{}"); } catch { return {}; }
  });
  const [isAdmin, setIsAdmin] = useState(false);
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("sm_dark") === "1"; } catch { return false; }
  });
  const [toast, setToast] = useState(null);

  // Load exam pages from the published Google Sheet on mount
  const loadFromSheet = useCallback(async () => {
    setSheetLoading(true);
    const sheetData = await loadExamsFromSheet();
    if (sheetData && Object.keys(sheetData).length > 0) {
      setExams(prev => ({ ...prev, ...sheetData }));
      setUsingSheet(true);
    } else {
      setUsingSheet(false);
    }
    setSheetLoading(false);
  }, []);

  useEffect(() => { loadFromSheet(); }, [loadFromSheet]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  const toggleDark = () => {
    setDarkMode(d => {
      const next = !d;
      localStorage.setItem("sm_dark", next ? "1" : "0");
      return next;
    });
  };

  const saveBookmark = (bookId, pageIdx) => {
    const next = { ...bookmarks, [`${bookId}_${pageIdx}`]: true };
    setBookmarks(next);
    localStorage.setItem("sm_bookmarks", JSON.stringify(next));
  };

  const removeBookmark = (bookId, pageIdx) => {
    const next = { ...bookmarks };
    delete next[`${bookId}_${pageIdx}`];
    setBookmarks(next);
    localStorage.setItem("sm_bookmarks", JSON.stringify(next));
  };

  const saveLastPage = (bookId, pageIdx) => {
    const next = { ...lastPage, [bookId]: pageIdx };
    setLastPage(next);
    localStorage.setItem("sm_lastpage", JSON.stringify(next));
  };

  // ── Local-only CRUD (session preview; the Google Sheet is the source of truth) ──
  const addExam = async (bookId, exam) => {
    const newExam = { ...exam, id: "local_" + Date.now().toString() };
    setExams(prev => ({
      ...prev,
      [bookId]: [...(prev[bookId] || []), newExam].sort((a, b) => a.pageOrder - b.pageOrder),
    }));
    showToast("Added (preview only — add a row in your Sheet to make it permanent) ✓");
  };

  const updateExam = async (bookId, examId, data) => {
    setExams(prev => ({
      ...prev,
      [bookId]: prev[bookId].map(e => e.id === examId ? { ...e, ...data } : e)
        .sort((a, b) => a.pageOrder - b.pageOrder),
    }));
    showToast("Updated (preview only — edit your Sheet to make it permanent) ✓");
  };

  const deleteExam = async (bookId, examId) => {
    setExams(prev => ({
      ...prev,
      [bookId]: prev[bookId].filter(e => e.id !== examId),
    }));
    showToast("Removed from preview", "danger");
  };

  const styles = getStyles(darkMode);

  return (
    <div style={styles.app}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)",
          background: toast.type === "danger" ? "#EF4444" : "#10B981",
          color: "#fff", padding: "10px 20px", borderRadius: 10,
          fontSize: 13, fontWeight: 700, zIndex: 9999,
          boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
          animation: "fadeInDown 0.3s ease",
          textAlign: "center", maxWidth: "90%",
        }}>
          {toast.msg}
        </div>
      )}

      {view === "library" && (
        <Library
          books={MOCK_BOOKS}
          exams={exams}
          onOpen={(id) => { setSelectedBook(id); setView("book"); }}
          onAdmin={() => setView("admin")}
          darkMode={darkMode}
          onToggleDark={toggleDark}
          styles={styles}
          lastPage={lastPage}
          bookmarks={bookmarks}
          usingSheet={usingSheet}
          sheetLoading={sheetLoading}
        />
      )}
      {view === "book" && selectedBook && (
        <BookReader
          book={MOCK_BOOKS[selectedBook]}
          exams={(exams[selectedBook] || []).filter(e => e.isPublished)}
          onClose={() => setView("library")}
          darkMode={darkMode}
          styles={styles}
          lastPage={lastPage[selectedBook] || 0}
          onPageChange={(p) => saveLastPage(selectedBook, p)}
          bookmarks={bookmarks}
          onBookmark={(p) => saveBookmark(selectedBook, p)}
          onUnbookmark={(p) => removeBookmark(selectedBook, p)}
        />
      )}
      {view === "admin" && (
        <AdminPanel
          isAdmin={isAdmin}
          onLogin={() => setIsAdmin(true)}
          onBack={() => setView("library")}
          exams={exams}
          books={MOCK_BOOKS}
          onAdd={addExam}
          onUpdate={updateExam}
          onDelete={deleteExam}
          styles={styles}
          darkMode={darkMode}
          usingSheet={usingSheet}
          onRefresh={loadFromSheet}
        />
      )}

      <style>{`
        @keyframes fadeInDown {
          from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
          to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes pageFlip {
          0%   { transform: rotateY(0deg); }
          50%  { transform: rotateY(-20deg) scale(0.96); }
          100% { transform: rotateY(0deg); }
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        .exam-content h3 { font-size: 15px; font-weight: 700; color: #374151; margin: 0 0 12px; padding-bottom: 8px; border-bottom: 1px dashed #E5E7EB; }
        .exam-content p  { margin: 8px 0; line-height: 1.9; }
        .exam-content hr { border: none; border-top: 1px solid #E5E7EB; margin: 16px 0; }
        .exam-content strong { font-weight: 700; }
        .exam-content em { color: #6B7280; font-style: italic; }
        .exam-content ul { padding-left: 20px; }
        .exam-content li { margin: 6px 0; line-height: 1.7; }
        .dark .exam-content h3 { color: #E2E8F0; border-color: #334155; }
        .dark .exam-content hr { border-color: #334155; }
        .dark .exam-content em { color: #94A3B8; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
      `}</style>
    </div>
  );
}

// BOOK READER
// ═══════════════════════════════════════════════════════════════════════════
function BookReader({ book, exams, onClose, darkMode, styles, lastPage, onPageChange, bookmarks, onBookmark, onUnbookmark }) {
  const [currentPage, setCurrentPage] = useState(lastPage);
  const [turning, setTurning] = useState(null);
  const [showTOC, setShowTOC] = useState(false);
  const touchStart = useRef(null);
  const dark = darkMode;

  const totalPages = exams.length + 1;

  const goTo = useCallback((dir) => {
    if (dir === "next" && currentPage < totalPages - 1) {
      setTurning("next");
      setTimeout(() => {
        const next = currentPage + 1;
        setCurrentPage(next);
        onPageChange(next);
        setTurning(null);
      }, 320);
    } else if (dir === "prev" && currentPage > 0) {
      setTurning("prev");
      setTimeout(() => {
        const next = currentPage - 1;
        setCurrentPage(next);
        onPageChange(next);
        setTurning(null);
      }, 320);
    }
  }, [currentPage, totalPages, onPageChange]);

  const jumpTo = (page) => {
    setCurrentPage(page);
    onPageChange(page);
    setShowTOC(false);
  };

  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === "ArrowRight") goTo("next");
      if (e.key === "ArrowLeft") goTo("prev");
      if (e.key === "Escape") setShowTOC(false);
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [goTo]);

  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStart.current === null) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 45) goTo(diff > 0 ? "next" : "prev");
    touchStart.current = null;
  };

  const currentExam = currentPage === 0 ? null : exams[currentPage - 1];
  const isBookmarked = bookmarks[`${book.id}_${currentPage}`];
  const progressPct = totalPages > 1 ? Math.round((currentPage / (totalPages - 1)) * 100) : 0;

  const pageStyle = {
    transition: "transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s ease",
    transform: turning === "next"
      ? "rotateY(-18deg) scale(0.96)"
      : turning === "prev"
        ? "rotateY(18deg) scale(0.96)"
        : "rotateY(0deg) scale(1)",
    opacity: turning ? 0.55 : 1,
  };

  return (
    <div style={styles.readerWrap} className={dark ? "dark" : ""}>
      {/* Top bar */}
      <div style={styles.readerBar}>
        <button style={styles.backBtn} onClick={onClose}>← Library</button>
        <div style={{ textAlign: "center", flex: 1 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: book.color }}>{book.title}</div>
          <div style={{ fontSize: 10, color: dark ? "#64748B" : "#9CA3AF" }}>
            {currentPage === 0 ? "Cover" : `Page ${currentPage} of ${totalPages - 1}`}
          </div>
        </div>
        <div style={{ display: "flex", gap: 5 }}>
          <button style={styles.iconBtn} onClick={() => setShowTOC(t => !t)} title="Table of Contents">
            📋
          </button>
          {currentPage > 0 && (
            <button
              style={{ ...styles.iconBtn, color: isBookmarked ? "#F59E0B" : (dark ? "#475569" : "#CBD5E1") }}
              onClick={() => isBookmarked ? onUnbookmark(currentPage) : onBookmark(currentPage)}
              title={isBookmarked ? "Remove bookmark" : "Bookmark this page"}
            >
              🔖
            </button>
          )}
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ height: 3, background: dark ? "#1E293B" : "#F3F4F6", flexShrink: 0 }}>
        <div style={{
          height: "100%", width: `${progressPct}%`,
          background: book.color, transition: "width 0.4s ease",
        }} />
      </div>

      {/* Table of Contents overlay */}
      {showTOC && (
        <div style={{
          position: "absolute", top: 56, left: 0, right: 0, zIndex: 50,
          background: dark ? "#0F172A" : "#fff",
          borderBottom: `1px solid ${dark ? "#1E293B" : "#E5E7EB"}`,
          maxHeight: "60vh", overflowY: "auto",
          boxShadow: "0 8px 24px rgba(0,0,0,0.15)",
        }}>
          <div style={{ padding: "12px 16px" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: dark ? "#64748B" : "#9CA3AF", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>
              Table of Contents
            </div>
            {/* Cover */}
            <button
              onClick={() => jumpTo(0)}
              style={{
                display: "flex", alignItems: "center", gap: 10, width: "100%",
                padding: "10px 12px", borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left",
                background: currentPage === 0
                  ? `${book.color}18`
                  : dark ? "#1E293B" : "#F9FAFB",
                color: dark ? "#E2E8F0" : "#1F2937",
                marginBottom: 4,
              }}
            >
              <span style={{ fontSize: 12, fontWeight: 700, color: book.color, minWidth: 28 }}>C</span>
              <span style={{ fontSize: 13, fontWeight: 600 }}>Cover Page</span>
            </button>
            {/* Exams */}
            {exams.map((exam, i) => {
              const tc = TYPE_CONFIG[exam.type] || {};
              const bm = bookmarks[`${book.id}_${i + 1}`];
              return (
                <button
                  key={exam.id}
                  onClick={() => jumpTo(i + 1)}
                  style={{
                    display: "flex", alignItems: "center", gap: 10, width: "100%",
                    padding: "10px 12px", borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left",
                    background: currentPage === i + 1
                      ? `${book.color}18`
                      : dark ? "#1E293B" : "#F9FAFB",
                    color: dark ? "#E2E8F0" : "#1F2937",
                    marginBottom: 4,
                  }}
                >
                  <span style={{ fontSize: 11, fontWeight: 700, color: book.color, minWidth: 28 }}>{i + 1}</span>
                  <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{exam.title}</span>
                  {bm && <span style={{ fontSize: 10 }}>🔖</span>}
                  <span style={{
                    fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5,
                    background: tc.bg || "#F3F4F6", color: tc.text || "#374151",
                    border: `1px solid ${tc.border || "#E5E7EB"}`,
                  }}>{exam.type}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Page */}
      <div
        style={styles.pageContainer}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div style={{ ...styles.page, ...pageStyle }}>
          {/* Page corner fold */}
          <div style={{
            position: "absolute", bottom: 0, right: 0,
            width: 0, height: 0, borderStyle: "solid",
            borderWidth: "0 0 28px 28px",
            borderColor: `transparent transparent ${dark ? "#1E293B" : "#E5E7EB"} transparent`,
          }} />

          {currentPage === 0 ? (
            <CoverPage book={book} exams={exams} dark={dark} />
          ) : currentExam ? (
            <ExamPage
              exam={currentExam}
              book={book}
              pageNum={currentPage}
              dark={dark}
              styles={styles}
            />
          ) : null}
        </div>
      </div>

      {/* Navigation */}
      <div style={styles.navBar}>
        <button
          style={{ ...styles.navBtn, opacity: currentPage === 0 ? 0.3 : 1 }}
          onClick={() => goTo("prev")}
          disabled={currentPage === 0 || !!turning}
        >
          ← Prev
        </button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: dark ? "#E2E8F0" : "#1F2937" }}>
            {currentPage} / {totalPages - 1}
          </div>
          <div style={{ fontSize: 10, color: dark ? "#64748B" : "#9CA3AF" }}>swipe or tap</div>
        </div>
        <button
          style={{
            ...styles.navBtn,
            opacity: currentPage === totalPages - 1 ? 0.3 : 1,
            background: book.color, color: "#fff", border: "none",
          }}
          onClick={() => goTo("next")}
          disabled={currentPage === totalPages - 1 || !!turning}
        >
          Next →
        </button>
      </div>
    </div>
  );
}

// RICH TEXT EDITOR
// ═══════════════════════════════════════════════════════════════════════════
function RichEditor({ value, onChange, dark }) {
  const editorRef = useRef(null);
  const [mode, setMode] = useState("visual"); // visual | html

  const exec = (cmd, val = null) => {
    editorRef.current?.focus();
    document.execCommand(cmd, false, val);
    syncFromEditor();
  };

  const syncFromEditor = () => {
    if (editorRef.current) onChange(editorRef.current.innerHTML);
  };

  useEffect(() => {
    if (editorRef.current && mode === "visual") {
      if (editorRef.current.innerHTML !== value) {
        editorRef.current.innerHTML = value || "";
      }
    }
  }, [mode]);

  const toolbarBtnStyle = (active) => ({
    padding: "4px 8px", fontSize: 12, borderRadius: 5, cursor: "pointer",
    border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
    background: active ? (dark ? "#334155" : "#E5E7EB") : "transparent",
    color: dark ? "#E2E8F0" : "#374151",
    fontWeight: 600,
  });

  return (
    <div style={{ border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, borderRadius: 8, overflow: "hidden" }}>
      {/* Toolbar */}
      <div style={{
        display: "flex", gap: 4, padding: "8px 10px", flexWrap: "wrap",
        background: dark ? "#1E293B" : "#F9FAFB",
        borderBottom: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
        alignItems: "center",
      }}>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("bold"); }} title="Bold"><strong>B</strong></button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("italic"); }} title="Italic"><em>I</em></button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("underline"); }} title="Underline"><u>U</u></button>
        <div style={{ width: 1, height: 20, background: dark ? "#334155" : "#E5E7EB", margin: "0 2px" }} />
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("formatBlock", "h3"); }} title="Heading">H3</button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("formatBlock", "p"); }} title="Paragraph">¶</button>
        <div style={{ width: 1, height: 20, background: dark ? "#334155" : "#E5E7EB", margin: "0 2px" }} />
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("insertUnorderedList"); }} title="List">• List</button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("insertHorizontalRule"); }} title="Divider">─</button>
        <div style={{ flex: 1 }} />
        <button
          style={{ ...toolbarBtnStyle(mode === "html"), fontSize: 10 }}
          onClick={() => {
            if (mode === "visual") {
              setMode("html");
            } else {
              setMode("visual");
            }
          }}
        >
          {mode === "visual" ? "</> HTML" : "Visual"}
        </button>
      </div>

      {/* Editor area */}
      {mode === "visual" ? (
        <div
          ref={editorRef}
          contentEditable
          suppressContentEditableWarning
          onInput={syncFromEditor}
          style={{
            minHeight: 200, padding: "14px", outline: "none",
            fontSize: 14, lineHeight: 1.8,
            color: dark ? "#E2E8F0" : "#1F2937",
            background: dark ? "#0F172A" : "#fff",
          }}
        />
      ) : (
        <textarea
          value={value}
          onChange={e => onChange(e.target.value)}
          style={{
            width: "100%", minHeight: 200, padding: "14px",
            border: "none", outline: "none", resize: "vertical",
            fontFamily: "monospace", fontSize: 12, lineHeight: 1.6,
            color: dark ? "#E2E8F0" : "#374151",
            background: dark ? "#0F172A" : "#fff",
          }}
        />
      )}

      {/* Preview */}
      {value && (
        <div style={{
          borderTop: `1px solid ${dark ? "#1E293B" : "#F3F4F6"}`,
          padding: "10px 14px",
          background: dark ? "#0F172A" : "#FEFDF8",
        }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: dark ? "#475569" : "#9CA3AF", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>
            Preview
          </div>
          <div
            className={`exam-content ${dark ? "dark" : ""}`}
            style={{ fontSize: 13, lineHeight: 1.8, color: dark ? "#CBD5E1" : "#374151" }}
            dangerouslySetInnerHTML={{ __html: value }}
          />
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════════════════════════════════════════
function AdminPanel({ isAdmin, onLogin, onBack, exams, books, onAdd, onUpdate, onDelete, styles, darkMode, usingSheet, onRefresh }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [adminView, setAdminView] = useState("list");
  const [editingExam, setEditingExam] = useState(null);
  const [selectedBook, setSelectedBook] = useState("second-paper");
  const [form, setForm] = useState({
    title: "", type: "Model Set", year: "", content: "", pdfUrl: "",
    pageOrder: 1, isPremium: false, isPublished: true,
  });
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const dark = darkMode;

  const handleLogin = () => {
    if (pw === ADMIN_PASSWORD) { onLogin(); setErr(""); }
    else setErr("Incorrect password. Try again.");
  };

  const openAdd = () => {
    const bookExams = exams[selectedBook] || [];
    setForm({
      title: "", type: "Model Set", year: "",
      content: "<p><strong>प्र.१.</strong> Question here <em>(marks)</em></p>",
      pdfUrl: "",
      pageOrder: bookExams.length + 1,
      isPremium: false, isPublished: true,
    });
    setEditingExam(null);
    setAdminView("form");
  };

  const openEdit = (exam) => {
    setForm({ ...exam });
    setEditingExam(exam.id);
    setAdminView("form");
  };

  const handleSave = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    if (editingExam) await onUpdate(selectedBook, editingExam, form);
    else await onAdd(selectedBook, form);
    setSaving(false);
    setSaved(true);
    setTimeout(() => { setSaved(false); setAdminView("list"); }, 900);
  };

  const handleDelete = async (examId) => {
    await onDelete(selectedBook, examId);
    setDeleteConfirm(null);
  };

  const inputStyle = {
    width: "100%", padding: "10px 12px", borderRadius: 8,
    border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
    background: dark ? "#1E293B" : "#fff",
    color: dark ? "#E2E8F0" : "#1F2937",
    fontSize: 14, outline: "none",
  };
  const selectStyle = { ...inputStyle };
  const labelStyle = {
    display: "block", fontSize: 11, fontWeight: 700,
    color: dark ? "#64748B" : "#9CA3AF",
    marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.5,
  };

  if (!isAdmin) {
    return (
      <div style={{ minHeight: "100vh", background: dark ? "#0F172A" : "#F8F7F2", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{
          width: 320, background: dark ? "#1E293B" : "#fff",
          borderRadius: 16, padding: "36px 28px", textAlign: "center",
          boxShadow: "0 8px 32px rgba(0,0,0,0.12)",
          border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
        }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🔐</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: dark ? "#F1F5F9" : "#1F2937", marginBottom: 6 }}>Admin Access</div>
          <div style={{ fontSize: 13, color: dark ? "#64748B" : "#9CA3AF", marginBottom: 24 }}>
            Enter admin password to manage books
          </div>
          <input
            type="password"
            value={pw}
            onChange={e => setPw(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            placeholder="Admin password"
            style={{ ...inputStyle, marginBottom: 8 }}
          />
          {err && <div style={{ color: "#EF4444", fontSize: 13, marginBottom: 10 }}>{err}</div>}
          <button
            style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: "#1A6B3C", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 4 }}
            onClick={handleLogin}
          >Login →</button>
          <button
            style={{ width: "100%", padding: "10px", borderRadius: 8, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 13, cursor: "pointer", marginTop: 8 }}
            onClick={onBack}
          >← Back to Library</button>
        </div>
      </div>
    );
  }

  // Form view
  if (adminView === "form") {
    return (
      <div style={{ minHeight: "100vh", background: dark ? "#0F172A" : "#F8F7F2" }} className={dark ? "dark" : ""}>
        {/* Header */}
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: "14px 16px", background: dark ? "#1E293B" : "#fff",
          borderBottom: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
          position: "sticky", top: 0, zIndex: 10,
        }}>
          <button style={styles.backBtn} onClick={() => setAdminView("list")}>← Back</button>
          <div style={{ fontWeight: 700, color: dark ? "#F1F5F9" : "#1F2937" }}>
            {editingExam ? "✏️ Edit Exam" : "➕ Add New Exam"}
          </div>
          <div style={{ fontSize: 10, color: dark ? "#64748B" : "#9CA3AF" }}>
            📝 Preview only
          </div>
        </div>

        <div style={{ padding: "16px", maxWidth: 480 }}>
          {/* Book selector */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>Book</label>
            <select style={selectStyle} value={selectedBook} onChange={e => setSelectedBook(e.target.value)}>
              <option value="second-paper">📕 Kharidar Second Paper</option>
              <option value="third-paper">📗 Kharidar Third Paper</option>
            </select>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>Exam Title</label>
            <input
              style={inputStyle}
              value={form.title}
              onChange={e => setForm(f => ({ ...f, title: e.target.value }))}
              placeholder="e.g. Model Set 15 or PYQ 2080"
            />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
            <div>
              <label style={labelStyle}>Type</label>
              <select style={selectStyle} value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
                <option>PYQ</option>
                <option>Model Set</option>
                <option>Practice Set</option>
                <option>Special Set</option>
              </select>
            </div>
            <div>
              <label style={labelStyle}>Year (optional)</label>
              <input
                style={inputStyle}
                value={form.year || ""}
                onChange={e => setForm(f => ({ ...f, year: e.target.value }))}
                placeholder="e.g. 2079"
              />
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>PDF URL (optional)</label>
            <input
              style={inputStyle}
              value={form.pdfUrl || ""}
              onChange={e => setForm(f => ({ ...f, pdfUrl: e.target.value }))}
              placeholder="Google Drive share link to the exam PDF"
            />
            <div style={{ fontSize: 10, color: dark ? "#475569" : "#9CA3AF", marginTop: 5 }}>
              Paste a normal Google Drive "share" link — it'll be converted to an embeddable preview automatically.
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>Content (optional notes)</label>
            <RichEditor
              value={form.content}
              onChange={content => setForm(f => ({ ...f, content }))}
              dark={dark}
            />
            <div style={{ fontSize: 10, color: dark ? "#475569" : "#9CA3AF", marginTop: 5 }}>
              Tip: Use H3 for sections, Bold for question numbers, Italic for marks. Leave empty if you're only embedding a PDF.
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
            <div>
              <label style={labelStyle}>Page Order</label>
              <input
                type="number"
                style={inputStyle}
                value={form.pageOrder}
                onChange={e => setForm(f => ({ ...f, pageOrder: parseInt(e.target.value) || 1 }))}
              />
            </div>
            <div>
              <label style={labelStyle}>Premium</label>
              <select style={selectStyle} value={form.isPremium ? "yes" : "no"} onChange={e => setForm(f => ({ ...f, isPremium: e.target.value === "yes" }))}>
                <option value="no">Free</option>
                <option value="yes">⭐ Premium</option>
              </select>
            </div>
            <div>
              <label style={labelStyle}>Status</label>
              <select style={selectStyle} value={form.isPublished ? "pub" : "draft"} onChange={e => setForm(f => ({ ...f, isPublished: e.target.value === "pub" }))}>
                <option value="pub">✅ Published</option>
                <option value="draft">📝 Draft</option>
              </select>
            </div>
          </div>

          <button
            style={{
              width: "100%", padding: "13px", borderRadius: 8, border: "none",
              background: saved ? "#10B981" : "#1A6B3C",
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: saving || saved ? "default" : "pointer",
              transition: "background 0.3s",
            }}
            onClick={handleSave}
            disabled={saving || saved}
          >
            {saving ? "Saving to Firestore..." : saved ? "✅ Saved!" : editingExam ? "Update Exam" : "Save New Exam"}
          </button>
        </div>
      </div>
    );
  }

  // List view
  const bookExams = exams[selectedBook] || [];
  const book = books[selectedBook];

  return (
    <div style={{ minHeight: "100vh", background: dark ? "#0F172A" : "#F8F7F2" }} className={dark ? "dark" : ""}>
      {/* Header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "14px 16px", background: dark ? "#1E293B" : "#fff",
        borderBottom: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
        position: "sticky", top: 0, zIndex: 10,
      }}>
        <button style={styles.backBtn} onClick={onBack}>← Library</button>
        <div style={{ fontWeight: 700, color: dark ? "#F1F5F9" : "#1F2937" }}>📋 Admin</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ fontSize: 10, color: usingSheet ? "#10B981" : "#F59E0B", fontWeight: 700 }}>
            {usingSheet ? "📊 Sheet" : "📦 Sample Data"}
          </div>
          <button
            onClick={onRefresh}
            title="Reload from Google Sheet"
            style={{ ...styles.iconBtn, width: 28, height: 28, fontSize: 12 }}
          >🔄</button>
        </div>
      </div>

      <div style={{ padding: "12px 16px 0" }}>
        <div style={{
          fontSize: 11, lineHeight: 1.6, padding: "10px 12px", borderRadius: 8,
          background: dark ? "#1E293B" : "#FFF8E1",
          border: `1px solid ${dark ? "#334155" : "#FDE68A"}`,
          color: dark ? "#FCD34D" : "#92400E",
        }}>
          📊 Exam pages are loaded from your Google Sheet. Edits below are a <strong>local preview only</strong> — to make permanent changes, edit the Sheet and tap 🔄 Refresh.
        </div>
      </div>

      <div style={{ padding: "16px 16px 0" }}>
        {/* Book tabs */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {Object.values(books).map(b => (
            <button key={b.id} onClick={() => setSelectedBook(b.id)} style={{
              flex: 1, padding: "9px 10px", borderRadius: 8, cursor: "pointer",
              border: `2px solid ${selectedBook === b.id ? b.color : (dark ? "#334155" : "#E5E7EB")}`,
              background: selectedBook === b.id ? `${b.color}15` : (dark ? "#1E293B" : "#F9FAFB"),
              color: selectedBook === b.id ? b.color : (dark ? "#94A3B8" : "#6B7280"),
              fontSize: 11, fontWeight: 700,
            }}>
              {b.emoji} {b.title.replace("Kharidar ", "")}
            </button>
          ))}
        </div>

        {/* Stats row */}
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {[
            { label: "Total", val: bookExams.length, color: book.color },
            { label: "Published", val: bookExams.filter(e => e.isPublished).length, color: "#10B981" },
            { label: "Premium", val: bookExams.filter(e => e.isPremium).length, color: "#F59E0B" },
            { label: "Draft", val: bookExams.filter(e => !e.isPublished).length, color: "#6B7280" },
          ].map(s => (
            <div key={s.label} style={{
              flex: 1, textAlign: "center", padding: "8px 4px",
              background: dark ? "#1E293B" : "#fff",
              borderRadius: 8, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
            }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: s.color }}>{s.val}</div>
              <div style={{ fontSize: 9, color: dark ? "#64748B" : "#9CA3AF", fontWeight: 600 }}>{s.label}</div>
            </div>
          ))}
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
          <button
            style={{
              padding: "9px 16px", borderRadius: 8, border: "none",
              background: book.color, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer",
            }}
            onClick={openAdd}
          >
            + Add New Exam Page
          </button>
        </div>
      </div>

      {/* Exam list */}
      <div style={{ padding: "0 16px 80px" }}>
        {bookExams.length === 0 ? (
          <div style={{ textAlign: "center", padding: 48, color: dark ? "#475569" : "#9CA3AF" }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📄</div>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>No exam pages yet</div>
            <div style={{ fontSize: 13 }}>Add your first exam page above</div>
          </div>
        ) : bookExams.map(exam => {
          const tc = TYPE_CONFIG[exam.type] || {};
          return (
            <div key={exam.id} style={{
              background: dark ? "#1E293B" : "#fff",
              border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
              borderRadius: 10, padding: "12px", marginBottom: 10,
              borderLeft: `3px solid ${tc.dot || book.color}`,
            }}>
              {/* Delete confirm */}
              {deleteConfirm === exam.id ? (
                <div style={{ textAlign: "center", padding: "8px 0" }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#EF4444", marginBottom: 10 }}>
                    Delete "{exam.title}"?
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ flex: 1, padding: "8px", borderRadius: 7, border: "none", background: "#EF4444", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }} onClick={() => handleDelete(exam.id)}>
                      Yes, Delete
                    </button>
                    <button style={{ flex: 1, padding: "8px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 13, cursor: "pointer" }} onClick={() => setDeleteConfirm(null)}>
                      Cancel
                    </button>
                  </div>
                </div>
              ) : (
                <>
                  <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <div style={{
                      width: 30, height: 30, borderRadius: 7, flexShrink: 0,
                      background: `${book.color}20`, color: book.color,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontWeight: 800, fontSize: 12,
                    }}>{exam.pageOrder}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: dark ? "#F1F5F9" : "#1F2937", marginBottom: 5 }}>
                        {exam.title}
                      </div>
                      <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: tc.bg || "#F3F4F6", color: tc.text || "#374151", border: `1px solid ${tc.border || "#E5E7EB"}` }}>{exam.type}</span>
                        {exam.year && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: dark ? "#0F172A" : "#F3F4F6", color: dark ? "#94A3B8" : "#6B7280", border: `1px solid ${dark ? "#1E293B" : "#E5E7EB"}` }}>{exam.year}</span>}
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: exam.isPublished ? "#D1FAE5" : "#FEF3C7", color: exam.isPublished ? "#065F46" : "#92400E", border: `1px solid ${exam.isPublished ? "#A7F3D0" : "#FDE68A"}` }}>
                          {exam.isPublished ? "✅ Published" : "📝 Draft"}
                        </span>
                        {exam.isPremium && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: "#FEF9C3", color: "#A16207", border: "1px solid #FDE047" }}>⭐ Premium</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                    <button style={{ flex: 1, padding: "7px 6px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 11, cursor: "pointer", fontWeight: 600 }}
                      onClick={() => onUpdate(selectedBook, exam.id, { isPublished: !exam.isPublished })}>
                      {exam.isPublished ? "Unpublish" : "Publish"}
                    </button>
                    <button style={{ flex: 1, padding: "7px 6px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 11, cursor: "pointer", fontWeight: 600 }}
                      onClick={() => onUpdate(selectedBook, exam.id, { isPremium: !exam.isPremium })}>
                      {exam.isPremium ? "Make Free" : "★ Premium"}
                    </button>
                    <button style={{ flex: 1, padding: "7px 6px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: "#2563EB", fontSize: 11, cursor: "pointer", fontWeight: 700 }}
                      onClick={() => openEdit(exam)}>
                      Edit
                    </button>
                    <button style={{ padding: "7px 10px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: "#EF4444", fontSize: 13, cursor: "pointer" }}
                      onClick={() => setDeleteConfirm(exam.id)}>
                      🗑
                    </button>
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// STYLES
// ═══════════════════════════════════════════════════════════════════════════
function getStyles(dark) {
  const bg = dark ? "#0F172A" : "#F4F1EA";
  const card = dark ? "#1E293B" : "#FFFFFF";
  const text = dark ? "#F1F5F9" : "#1F2937";
  const muted = dark ? "#64748B" : "#6B7280";
  const border = dark ? "#1E293B" : "#E5E7EB";
  const pageBg = dark ? "#111827" : "#FEFDF8";

  return {
    app: {
      minHeight: "100vh", background: bg, color: text,
      fontFamily: "'Segoe UI', system-ui, -apple-system, sans-serif",
      maxWidth: 480, margin: "0 auto", position: "relative",
    },
    library: { minHeight: "100vh", background: bg },
    libraryHeader: {
      display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: "18px 20px 14px",
      background: card, borderBottom: `1px solid ${border}`,
    },
    libraryTitle: { fontSize: 19, fontWeight: 800, color: text },
    librarySubtitle: { fontSize: 11, color: muted, marginTop: 2 },
    shelfWrap: { padding: "24px 20px 20px" },
    shelfLabel: {
      fontSize: 11, fontWeight: 700, color: muted,
      marginBottom: 18, textTransform: "uppercase", letterSpacing: 1.2,
    },
    shelf: {
      background: dark ? "#1A0F08" : "#7A5C20",
      borderRadius: 14, padding: "28px 24px 0", minHeight: 270,
      position: "relative",
      boxShadow: dark
        ? "inset 0 2px 8px rgba(0,0,0,0.5)"
        : "inset 0 2px 8px rgba(0,0,0,0.2), 0 4px 16px rgba(0,0,0,0.15)",
    },
    shelfPlank: {
      position: "absolute", bottom: 0, left: 0, right: 0, height: 20,
      background: dark ? "#2D1A0A" : "#5C4010",
      borderRadius: "0 0 14px 14px",
      boxShadow: "0 4px 0 rgba(0,0,0,0.3)",
    },
    booksRow: {
      display: "flex", gap: 22, justifyContent: "center", flexWrap: "wrap",
    },
    infoGrid: {
      display: "grid", gridTemplateColumns: "1fr 1fr",
      gap: 12, padding: "0 20px", marginTop: 4,
    },
    infoCard: {
      background: card, border: `1px solid ${border}`,
      borderRadius: 12, padding: "14px",
    },
    openBtn: {
      width: "100%", padding: "8px 0", borderRadius: 8,
      border: "none", color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer",
    },
    footer: {
      textAlign: "center", fontSize: 11, color: muted,
      marginTop: 20, padding: "14px 20px",
      borderTop: `1px solid ${border}`,
    },
    readerWrap: {
      minHeight: "100vh", background: bg,
      display: "flex", flexDirection: "column", position: "relative",
    },
    readerBar: {
      display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: "11px 14px", background: card,
      borderBottom: `1px solid ${border}`,
      position: "sticky", top: 0, zIndex: 20, flexShrink: 0,
    },
    pageContainer: {
      flex: 1, display: "flex", alignItems: "flex-start",
      justifyContent: "center", padding: "16px",
      overflowY: "auto", perspective: "1000px",
    },
    page: {
      width: "100%", maxWidth: 440,
      background: pageBg, borderRadius: 3,
      minHeight: 520, position: "relative",
      borderLeft: `4px solid ${dark ? "#334155" : "#DDD6C0"}`,
      boxShadow: dark
        ? "6px 6px 24px rgba(0,0,0,0.5), inset 0 0 0 0.5px rgba(255,255,255,0.04)"
        : "4px 4px 20px rgba(0,0,0,0.1), 8px 0 16px rgba(0,0,0,0.04)",
    },
    navBar: {
      display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: "12px 16px", background: card,
      borderTop: `1px solid ${border}`,
      position: "sticky", bottom: 0, flexShrink: 0,
    },
    navBtn: {
      padding: "10px 16px", borderRadius: 8,
      border: `1px solid ${border}`,
      background: card, color: text,
      fontSize: 13, fontWeight: 700, cursor: "pointer",
    },
    backBtn: {
      padding: "6px 12px", borderRadius: 7,
      border: `1px solid ${border}`,
      background: "transparent", color: text,
      fontSize: 12, cursor: "pointer", fontWeight: 600,
    },
    iconBtn: {
      width: 34, height: 34, borderRadius: 8,
      border: `1px solid ${border}`, background: "transparent",
      cursor: "pointer", fontSize: 15,
      display: "flex", alignItems: "center", justifyContent: "center",
    },
  };
}
