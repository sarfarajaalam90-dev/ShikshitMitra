<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>पुस्तक | Shikshit Mitra</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1018;
  --surface:#1a1b26;
  --border:rgba(255,255,255,0.07);
  --text:#e8e9f0;
  --muted:#888;
  --accent:#8c6ed6;
  --page-bg:#fffef8;
  --page-line:#e8e4d8;
  --page-text:#1a1a2e;
  --page-head:#3d1f7a;
  --spine:#2d1f5e;
  --margin-w:40px;
}

html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}

.app{display:flex;flex-direction:column;height:100vh;width:100vw}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:0 16px;height:52px;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;
}
.topbar-title{flex:1;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Noto Serif Devanagari',serif}
.topbar-page{font-size:13px;color:var(--muted);white-space:nowrap}
.topbar-page__sep{margin:0 2px}
.app-logo{width:26px;height:26px;border-radius:6px;object-fit:contain;flex-shrink:0;display:none}
.app-logo.is-visible{display:block}

/* ── Stage ── */
.stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  background:radial-gradient(ellipse at center, #1e1f2e 0%, #0f1018 100%);
}

/* ── Nav arrows ── */
.nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:50%;color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:5;transition:background .15s;flex-shrink:0;
}
.nav:hover{background:rgba(255,255,255,0.14)}
.nav:disabled{opacity:.2;cursor:default;pointer-events:none}
.nav svg{width:20px;height:20px}
.nav--left{left:12px}
.nav--right{right:12px}

/* ── Book wrapper ── */
.book-wrap{
  perspective:2000px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* ── The book ── */
.book{
  position:relative;
  display:flex;
  transform-style:preserve-3d;
  filter:drop-shadow(0 24px 48px rgba(0,0,0,0.6));
}

/* ── Page ── */
.page{
  width:var(--pw);height:var(--ph);
  background:var(--page-bg);
  position:relative;overflow:hidden;
  flex-shrink:0;
}

/* Left page — slightly darker */
.page--left{
  border-radius:4px 0 0 4px;
  background:linear-gradient(to right, #f5f3ec, #fffef8);
  border-right:1px solid var(--page-line);
}

/* Right page */
.page--right{
  border-radius:0 4px 4px 0;
  background:var(--page-bg);
}

/* Spine shadow on left page */
.page--left::after{
  content:'';position:absolute;top:0;right:0;width:32px;height:100%;
  background:linear-gradient(to left, rgba(0,0,0,0.08), transparent);
  pointer-events:none;
}

/* Spine shadow on right page */
.page--right::before{
  content:'';position:absolute;top:0;left:0;width:32px;height:100%;
  background:linear-gradient(to right, rgba(0,0,0,0.06), transparent);
  pointer-events:none;z-index:1;
}

/* Spine */
.spine{
  width:12px;height:var(--ph);
  background:linear-gradient(to bottom, #4a2d8a, var(--spine), #2a1a50);
  flex-shrink:0;
  box-shadow:inset -2px 0 4px rgba(0,0,0,0.3), inset 2px 0 4px rgba(0,0,0,0.3);
}

/* Page content */
.page-inner{
  padding:18px 0 14px;
  height:100%;display:flex;flex-direction:column;
  position:relative;z-index:2;
}

/* One horizontal strip of the page: a margin cell (carries the red rule)
   plus a content cell. Question rows, the head row, and (optionally) the
   section banner all share this grid so the red line reads as one
   continuous rule down the page. */
.page-row{display:flex;align-items:stretch}

.margin-cell{
  width:var(--margin-w);flex-shrink:0;
  border-right:1px solid rgba(220,80,80,0.32);
  display:flex;justify-content:center;
  padding-top:3px;
}

.content-cell{
  flex:1;min-width:0;
  padding:0 28px 0 14px;
}

/* ── Head row (running book title) ── */
.head-row{margin-bottom:8px}
.page-head-text{
  font-family:'Noto Serif Devanagari',serif;
  font-size:13px;font-weight:600;
  color:var(--page-head);
  text-transform:uppercase;letter-spacing:.06em;
  padding:8px 0 8px;
  border-bottom:1.5px solid var(--accent);
  opacity:.7;
}

/* ── Question rows ── */
.page-blocks{flex:1;overflow:hidden}

.q-num{
  font-family:'Noto Serif Devanagari',serif;
  font-size:10px;font-weight:700;line-height:1.25;
  color:var(--page-head);
  text-align:center;
}

.q-text-wrap{
  position:relative;overflow:hidden;
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 23px,
    var(--page-line) 23px,
    var(--page-line) 24px
  );
}

.q-text{
  font-family:'Noto Serif Devanagari',serif;
  font-size:14px;line-height:24px;
  color:var(--page-text);
  white-space:pre-wrap;word-break:break-word;
}

/* ── Section banner ── */
.banner-row{margin:5px 0 7px;padding:0 28px 0 14px}
.section-banner{
  background:linear-gradient(135deg, var(--accent), #6b4fb3);
  color:#fff;
  font-family:'Noto Serif Devanagari',serif;
  font-size:12px;font-weight:700;letter-spacing:.04em;
  text-align:center;
  padding:6px 10px;border-radius:4px;
}

/* ── Page number footer ── */
.num-row{justify-content:center;padding-top:6px}
.page-num{
  font-size:11px;color:var(--muted);
  letter-spacing:.05em;
}

/* ── Flip animation ── */
.flip-container{
  position:absolute;top:0;
  width:var(--pw);height:var(--ph);
  transform-style:preserve-3d;
  pointer-events:none;
  z-index:10;
}
.flip-container.is-right{left:50%;transform-origin:left center}
.flip-container.is-left{right:50%;transform-origin:right center}

.flip-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}
.flip-face--back{transform:rotateY(180deg)}

/* ── Overlays ── */
.overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;background:var(--bg);z-index:30;border-radius:6px;
}
.overlay.is-hidden{display:none}

.spinner{
  width:34px;height:34px;
  border:3px solid rgba(255,255,255,0.08);
  border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.overlay-text{font-size:14px;color:var(--muted)}
.retry-btn{
  padding:8px 20px;background:var(--accent);color:#fff;
  border:none;border-radius:6px;font-size:13px;cursor:pointer;
  font-family:'Noto Serif Devanagari',serif;
}

/* ── Toolbar ── */
.toolbar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  height:44px;background:var(--surface);border-top:1px solid var(--border);
  flex-shrink:0;
}
.tbtn{
  width:34px;height:34px;background:transparent;border:none;border-radius:6px;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.tbtn:hover{background:rgba(255,255,255,0.07);color:var(--text)}
.tbtn svg{width:17px;height:17px}
.tdiv{width:1px;height:18px;background:var(--border);margin:0 4px}

/* ── Toast ── */
.toast{
  position:fixed;bottom:56px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#2a2b38;color:var(--text);font-size:13px;
  padding:8px 18px;border-radius:20px;
  opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  white-space:nowrap;z-index:999;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Single page mode (mobile) ── */
.book.single .page--left{display:none}
.book.single .spine{display:none}
.book.single .page--right{border-radius:4px}

@media(max-width:600px){
  .nav--left{left:4px}
  .nav--right{right:4px}
}
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <button class="tbtn" id="backBtn" aria-label="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <img class="app-logo" id="appLogo" alt="">
    <div class="topbar-title" id="bookTitle">शिक्षित मित्र</div>
    <div class="topbar-page">
      <span id="pageCurrent">–</span><span class="topbar-page__sep">/</span><span id="pageTotal">–</span>
    </div>
  </header>

  <main class="stage" id="stage">

    <button class="nav nav--left" id="prevBtn" aria-label="prev">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <div class="book-wrap" id="bookWrap">
      <div class="book" id="book">
        <div class="page page--left" id="pageLeft">
          <div class="page-inner" id="leftInner"></div>
        </div>
        <div class="spine"></div>
        <div class="page page--right" id="pageRight">
          <div class="page-inner" id="rightInner"></div>
        </div>

        <!-- Flip leaf (injected during animation) -->
        <div class="flip-container" id="flipLeaf" style="display:none">
          <div class="flip-face flip-face--front" id="flipFront"></div>
          <div class="flip-face flip-face--back"  id="flipBack"></div>
        </div>
      </div>

      <!-- Loading / error overlays -->
      <div class="overlay" id="overlayLoad">
        <div class="spinner"></div>
        <p class="overlay-text">पाना लोड हुँदैछ…</p>
      </div>
      <div class="overlay is-hidden" id="overlayErr">
        <p class="overlay-text" id="errMsg">लोड गर्न सकिएन</p>
        <button class="retry-btn" id="retryBtn">फेरि प्रयास गर्नुहोस्</button>
      </div>
    </div>

    <button class="nav nav--right" id="nextBtn" aria-label="next">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>

  </main>

  <footer class="toolbar">
    <button class="tbtn" id="fullBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/>
        <path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
  </footer>

  <div class="toast" id="toast"></div>
</div>

<script>
(function(){
"use strict";

/* ── Config ── */
var SHEET_URL =
  "https://docs.google.com/spreadsheets/d/e/" +
  "2PACX-1vS5svv38RZ1MJ54P73voMTXWZYuNZZeU6Hy4uWsXS95Z0BcydyeRsQINcY8gzVyKYNCeQoM8u3gs7E_" +
  "/pub?output=csv";

var params      = new URLSearchParams(window.location.search);
var BOOK_FILTER = (params.get("book") || "second").toLowerCase().trim();
var FLIP_MS     = 550;

/* Update this to your actual logo filename once uploaded — the img just
   hides itself (via onerror) if the file isn't found, so it's safe to
   leave pointing at a placeholder name for now. */
var LOGO_SRC = "logo.png";

var LINE_H               = 24;   // px per ruled line — must match the CSS gradient + .q-text line-height
var DEFAULT_LINES        = 3;    // fallback when a row has no 'lines' value
var SECTION_BANNER_LINES = 2;    // line-budget "cost" of showing a section banner
var PAGE_OVERHEAD        = 110;  // approx px used by head-row + num-row + page-inner padding

var state = {
  title:    params.get("title") || "शिक्षित मित्र",
  pages:    [],   // [{num, blocks:[{type:'banner',text} | {type:'question',title,content,lines}]}]
  rawItems: [],   // flat list fetched from the sheet, before pagination
  cur:      1,    // 1-based, always the RIGHT page index
  single:   false,
  flipping: false,
  ph:       0,
  pw:       0
};

/* ── Refs ── */
var $ = function(id){ return document.getElementById(id); };
var el = {
  bookTitle:$("bookTitle"), pageCurrent:$("pageCurrent"), pageTotal:$("pageTotal"),
  stage:$("stage"), bookWrap:$("bookWrap"), book:$("book"),
  pageLeft:$("pageLeft"), pageRight:$("pageRight"),
  leftInner:$("leftInner"), rightInner:$("rightInner"),
  flipLeaf:$("flipLeaf"), flipFront:$("flipFront"), flipBack:$("flipBack"),
  overlayLoad:$("overlayLoad"), overlayErr:$("overlayErr"), errMsg:$("errMsg"),
  prevBtn:$("prevBtn"), nextBtn:$("nextBtn"), retryBtn:$("retryBtn"),
  backBtn:$("backBtn"), fullBtn:$("fullBtn"), toast:$("toast"), appLogo:$("appLogo")
};

/* ── Toast ── */
var _tt;
function toast(msg){
  el.toast.textContent = msg;
  el.toast.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.toast.classList.remove("show"); }, 1800);
}

/* ── HTML escape (content is now assembled via innerHTML) ── */
function esc(s){
  return String(s==null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ── CSV parser ── */
function parseCSV(text){
  var rows=[], lines=text.split(/\r?\n/);
  lines.forEach(function(line){
    if(!line.trim()) return;
    var cols=[],cur="",inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(inQ){ if(ch==='"'){ if(line[i+1]==='"'){cur+='"';i++;}else inQ=false; } else cur+=ch; }
      else{ if(ch==='"') inQ=true; else if(ch===','){cols.push(cur.trim());cur="";} else cur+=ch; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  });
  return rows;
}

/* ── Fetch pages from sheet ── */
function fetchPages(){
  return fetch(SHEET_URL)
    .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
    .then(function(csv){
      var rows = parseCSV(csv);
      if(rows.length < 2) throw new Error("empty");
      var h    = rows[0].map(function(x){ return x.toLowerCase().trim(); });
      var cBook    = h.indexOf("book");
      var cTitle   = h.indexOf("title");
      var cContent = h.indexOf("content");
      var cOrder   = h.indexOf("order");
      var cSection = h.indexOf("section");
      var cLines   = h.indexOf("lines");
      if(cBook<0) throw new Error("no book column");

      var out=[];
      for(var r=1;r<rows.length;r++){
        var row=rows[r];
        if(!row[cBook]) continue;
        if(row[cBook].toLowerCase().trim() !== BOOK_FILTER) continue;
        var lines = cLines>=0 ? Math.ceil(parseFloat(row[cLines])) : NaN;
        if(!lines || lines<1) lines = DEFAULT_LINES;
        out.push({
          title:   cTitle>=0   ? row[cTitle]||""   : "",
          content: cContent>=0 ? row[cContent]||"" : "",
          section: cSection>=0 ? row[cSection]||"" : "",
          lines:   lines,
          order:   cOrder>=0   ? parseInt(row[cOrder],10)||9999 : 9999
        });
      }
      out.sort(function(a,b){return a.order-b.order;});
      return out;
    });
}

/* ── Layout ── */
function layout(){
  var sw = el.stage.clientWidth  - 96;
  var sh = el.stage.clientHeight - 16;
  state.single = sw < 520;

  var ph = sh;
  var pw = state.single ? sw : sw/2;

  pw = Math.floor(pw);
  ph = Math.floor(ph);
  state.ph = ph;
  state.pw = pw;

  el.book.style.setProperty("--pw", pw+"px");
  el.book.style.setProperty("--ph", ph+"px");
  el.book.classList.toggle("single", state.single);
}

function computeLinesPerPage(){
  return Math.max(6, Math.floor((state.ph - PAGE_OVERHEAD) / LINE_H));
}

/* ── Pack the flat question list into pages, inserting section banners ── */
function buildPages(items, linesPerPage){
  var pages = [];
  var current, used, lastSection;

  function startPage(){
    current = { blocks: [] };
    pages.push(current);
    used = 0;
  }
  startPage();

  items.forEach(function(item){
    var isFirstOnPage = current.blocks.length === 0;
    var needBanner = !!item.section && (isFirstOnPage || item.section !== lastSection);
    var cost = (needBanner ? SECTION_BANNER_LINES : 0) + item.lines;

    if(used > 0 && used + cost > linesPerPage){
      startPage();
      needBanner = !!item.section;
      cost = (needBanner ? SECTION_BANNER_LINES : 0) + item.lines;
    }

    if(needBanner){
      current.blocks.push({ type:"banner", text:item.section });
      used += SECTION_BANNER_LINES;
      lastSection = item.section;
    }
    current.blocks.push({ type:"question", title:item.title, content:item.content, lines:item.lines });
    used += item.lines;
    if(item.section) lastSection = item.section;
  });

  if(pages.length && pages[pages.length-1].blocks.length === 0) pages.pop();
  if(!pages.length) pages.push({ blocks: [] });
  pages.forEach(function(p,i){ p.num = i+1; });
  return pages;
}

function repaginate(){
  var lpp = computeLinesPerPage();
  state.pages = buildPages(state.rawItems, lpp);
  TOTAL_PAGES = state.pages.length;
  if(state.cur > TOTAL_PAGES) state.cur = TOTAL_PAGES;
  if(state.cur < 1) state.cur = 1;
}

/* ── Build the inner HTML for one page ── */
function buildPageInnerHTML(pageObj){
  if(!pageObj) return "";
  var html = '<div class="page-row head-row"><div class="margin-cell"></div>'
           + '<div class="content-cell"><div class="page-head-text">'+esc(state.title)+'</div></div></div>'
           + '<div class="page-blocks">';

  pageObj.blocks.forEach(function(b){
    if(b.type === "banner"){
      html += '<div class="page-row banner-row"><div class="section-banner">'+esc(b.text)+'</div></div>';
    } else {
      html += '<div class="page-row">'
            +   '<div class="margin-cell"><div class="q-num">'+esc(b.title)+'</div></div>'
            +   '<div class="content-cell"><div class="q-text-wrap" style="height:'+(b.lines*LINE_H)+'px">'
            +     '<div class="q-text">'+esc(b.content)+'</div>'
            +   '</div></div>'
            + '</div>';
    }
  });

  html += '</div>'
        + '<div class="page-row num-row"><div class="page-num">'+esc(pageObj.num||"")+'</div></div>';
  return html;
}

/* ── Render spread (no animation) ── */
function renderSpread(rightIdx){
  state.cur = rightIdx;
  var leftIdx = rightIdx - 1;
  var rightPage = state.pages[rightIdx - 1] || null;
  var leftPage  = (!state.single && leftIdx >= 1) ? state.pages[leftIdx - 1] : null;

  el.rightInner.innerHTML = buildPageInnerHTML(rightPage);
  el.leftInner.innerHTML  = buildPageInnerHTML(leftPage);

  el.pageCurrent.textContent = rightIdx;
  el.pageTotal.textContent   = TOTAL_PAGES;
  el.prevBtn.disabled = rightIdx <= 1;
  el.nextBtn.disabled = rightIdx >= TOTAL_PAGES;
}

/* ── Clone a page side for flip animation ── */
function clonePageHTML(pageData, isRight){
  var div = document.createElement("div");
  div.className = "page " + (isRight ? "page--right" : "page--left");
  div.style.cssText = "width:100%;height:100%;position:absolute;inset:0;";
  var inner = document.createElement("div");
  inner.className = "page-inner";
  inner.innerHTML = buildPageInnerHTML(pageData);
  div.appendChild(inner);
  return div.outerHTML;
}

/* ── Animate flip ── */
function animateFlip(toRight, toIdx, done){
  if(state.flipping) return;
  state.flipping = true;

  var leaf  = el.flipLeaf;
  var front = el.flipFront;
  var back  = el.flipBack;

  // Decide pages for front/back faces
  var frontPageIdx, backPageIdx;
  if(toRight){ // going next: leaf comes from right side
    frontPageIdx = state.cur;       // current right page
    backPageIdx  = toIdx;           // next page
    leaf.className = "flip-container is-right";
  } else {     // going prev: leaf comes from left side
    frontPageIdx = state.cur - 1;  // current left page
    backPageIdx  = toIdx - 1;      // prev spread left page
    leaf.className = "flip-container is-left";
  }

  front.innerHTML = clonePageHTML(state.pages[frontPageIdx-1]||null, !toRight);
  back.innerHTML  = clonePageHTML(state.pages[backPageIdx-1]||null,  toRight);

  leaf.style.display = "block";
  leaf.style.transform = "rotateY(0deg)";
  leaf.style.transition = "none";

  // Force reflow
  leaf.getBoundingClientRect();

  var startAngle = 0;
  var endAngle   = toRight ? -180 : 180;
  var startTime  = null;

  function ease(t){ return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }

  function tick(ts){
    if(!startTime) startTime = ts;
    var t = Math.min((ts-startTime)/FLIP_MS, 1);
    var angle = startAngle + (endAngle - startAngle) * ease(t);
    leaf.style.transform = "rotateY("+angle+"deg)";
    if(t < 1){ requestAnimationFrame(tick); }
    else{
      leaf.style.display = "none";
      state.flipping = false;
      done();
    }
  }
  requestAnimationFrame(tick);
}

/* ── Navigation ── */
function goNext(){
  if(state.flipping || state.cur >= TOTAL_PAGES) return;
  var toIdx = state.cur + 1;
  animateFlip(true, toIdx, function(){ renderSpread(toIdx); });
}

function goPrev(){
  if(state.flipping || state.cur <= 1) return;
  var toIdx = state.cur - 1;
  animateFlip(false, toIdx, function(){ renderSpread(toIdx); });
}

/* ── Swipe ── */
var _sx=0, _sy=0, _st=0;
el.stage.addEventListener("touchstart", function(e){
  var t=e.touches[0]; _sx=t.clientX; _sy=t.clientY; _st=Date.now();
}, {passive:true});
el.stage.addEventListener("touchend", function(e){
  var t=e.changedTouches[0];
  var dx=t.clientX-_sx, dy=t.clientY-_sy, dt=Date.now()-_st;
  if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40 && dt<400){
    if(dx<0) goNext(); else goPrev();
  }
}, {passive:true});

/* ── Keyboard ── */
document.addEventListener("keydown", function(e){
  if(e.key==="ArrowRight"||e.key==="ArrowDown") goNext();
  if(e.key==="ArrowLeft" ||e.key==="ArrowUp")   goPrev();
});

/* ── Back ── */
el.backBtn.addEventListener("click", function(){
  if(window.history.length>1) window.history.back();
  else window.location.href="index.html";
});

/* ── Fullscreen ── */
el.fullBtn.addEventListener("click", function(){
  var isFull = document.fullscreenElement || document.webkitFullscreenElement;
  if(!isFull){
    var req = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;
    if(req) req.call(document.documentElement);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  }
});

/* ── Nav buttons ── */
el.prevBtn.addEventListener("click", goPrev);
el.nextBtn.addEventListener("click", goNext);
el.retryBtn.addEventListener("click", load);

/* ── Resize ── */
var _rt;
window.addEventListener("resize", function(){
  clearTimeout(_rt);
  _rt = setTimeout(function(){ layout(); repaginate(); renderSpread(state.cur); }, 200);
});

/* ── Overlays ── */
function showLoad(){ el.overlayLoad.classList.remove("is-hidden"); el.overlayErr.classList.add("is-hidden"); }
function showErr(msg){ el.overlayLoad.classList.add("is-hidden"); el.overlayErr.classList.remove("is-hidden"); el.errMsg.textContent=msg||"लोड गर्न सकिएन"; }
function hideOverlays(){ el.overlayLoad.classList.add("is-hidden"); el.overlayErr.classList.add("is-hidden"); }

/* ── Load ── */
var TOTAL_PAGES = 1;

function load(){
  showLoad();
  state.rawItems = [];
  state.cur      = 1;
  el.bookTitle.textContent = state.title;

  if(LOGO_SRC){
    el.appLogo.onload  = function(){ el.appLogo.classList.add("is-visible"); };
    el.appLogo.onerror = function(){ el.appLogo.classList.remove("is-visible"); };
    el.appLogo.src = LOGO_SRC;
  }

  layout();

  fetchPages().then(function(items){
    state.rawItems = items;
    repaginate();
    hideOverlays();
    renderSpread(state.cur);
  }).catch(function(err){
    console.error(err);
    state.rawItems = [];
    repaginate();
    hideOverlays();
    renderSpread(state.cur);
  });
}

document.addEventListener("DOMContentLoaded", load);
})();
</script>
</body>
</html>
