// ─── DATA SOURCE: Google Sheet (published as CSV) ───────────────────────────
// Expected header row (any order, case-insensitive):
// Book | PageOrder | Title | Type | Year | Premium | Published | PdfUrl | Content
//
// Book      → "second-paper" or "third-paper"
// PageOrder → 1, 2, 3 ... (controls page order inside the book)
// Type      → PYQ / Model Set / Practice Set / Special Set
// Premium   → yes/no
// Published → yes/no
// PdfUrl    → Google Drive share link to the exam PDF (optional)
// Content   → optional HTML notes shown above/below the PDF
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS5svv38RZ1MJ54P73voMTXWZYuNZZeU6Hy4uWsXS95Z0BcydyeRsQINcY8gzVyKYNCeQoM8u3gs7E_/pub?output=csv";

function parseCSV(csv) {
  var lines = csv.replace(/\r/g, "").trim().split("\n");
  if (lines.length < 2) return [];
  var headers = lines[0].split(",").map(function (h) { return h.replace(/"/g, "").trim(); });
  return lines.slice(1).map(function (line) {
    var cols = [], cur = "", inQ = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    var obj = {};
    headers.forEach(function (h, i) { obj[h] = (cols[i] || "").replace(/^"|"$/g, "").trim(); });
    return obj;
  });
}

// Turn a normal Google Drive "share" link into an embeddable preview link
function driveToPreview(url) {
  if (!url) return "";
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/) || url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return "https://drive.google.com/file/d/" + m[1] + "/preview";
  return url;
}

const TRUE_VALUES = ["yes", "true", "1", "y", "published", "premium"];
function toBool(v, defaultTrue) {
  if (v === undefined || v === null || String(v).trim() === "") return !!defaultTrue;
  return TRUE_VALUES.indexOf(String(v).trim().toLowerCase()) !== -1;
}
function getField(row, names) {
  for (var i = 0; i < names.length; i++) {
    var key = Object.keys(row).find(function (k) { return k.trim().toLowerCase() === names[i].toLowerCase(); });
    if (key !== undefined && row[key] !== undefined) return row[key];
  }
  return "";
}

async function loadExamsFromSheet() {
  try {
    const res = await fetch(SHEET_CSV_URL + (SHEET_CSV_URL.indexOf("?") > -1 ? "&" : "?") + "t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const rows = parseCSV(await res.text());
    if (!rows.length) return null;

    const grouped = {};
    rows.forEach(function (r, idx) {
      const book = getField(r, ["Book"]).trim();
      const title = getField(r, ["Title"]).trim();
      if (!book || !title) return;
      if (!grouped[book]) grouped[book] = [];
      const pageOrder = parseInt(getField(r, ["PageOrder", "Order"]), 10) || (grouped[book].length + 1);
      grouped[book].push({
        id: "sheet_" + book + "_" + idx,
        title: title,
        type: getField(r, ["Type"]).trim() || "Practice Set",
        year: getField(r, ["Year"]).trim() || null,
        pageOrder: pageOrder,
        isPremium: toBool(getField(r, ["Premium"]), false),
        isPublished: toBool(getField(r, ["Published"]), true),
        pdfUrl: driveToPreview(getField(r, ["PdfUrl", "PDF", "PdfLink"]).trim()),
        content: getField(r, ["Content"]).trim(),
      });
    });

    Object.keys(grouped).forEach(function (b) {
      grouped[b].sort(function (a, b2) { return a.pageOrder - b2.pageOrder; });
    });
    return grouped;
  } catch (e) {
    console.warn("Sheet load failed, using mock data:", e);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState("library");
  const [selectedBook, setSelectedBook] = useState(null);
  const [exams, setExams] = useState(MOCK_EXAMS);
  const [usingSheet, setUsingSheet] = useState(false);
  const [sheetLoading, setSheetLoading] = useState(true);
  const [bookmarks, setBookmarks] = useState(() => {
    try { return JSON.parse(localStorage.getItem("sm_bookmarks") || "{}"); } catch { return {}; }
  });
  const [lastPage, setLastPage] = useState(() => {
    try { return JSON.parse(localStorage.getItem("sm_lastpage") || "{}"); } catch { return {}; }
  });
  const [isAdmin, setIsAdmin] = useState(false);
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("sm_dark") === "1"; } catch { return false; }
  });
  const [toast, setToast] = useState(null);

  // Load exam pages from the published Google Sheet on mount
  const loadFromSheet = useCallback(async () => {
    setSheetLoading(true);
    const sheetData = await loadExamsFromSheet();
    if (sheetData && Object.keys(sheetData).length > 0) {
      setExams(prev => ({ ...prev, ...sheetData }));
      setUsingSheet(true);
    } else {
      setUsingSheet(false);
    }
    setSheetLoading(false);
  }, []);

  useEffect(() => { loadFromSheet(); }, [loadFromSheet]);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  const toggleDark = () => {
    setDarkMode(d => {
      const next = !d;
      localStorage.setItem("sm_dark", next ? "1" : "0");
      return next;
    });
  };

  const saveBookmark = (bookId, pageIdx) => {
    const next = { ...bookmarks, [`${bookId}_${pageIdx}`]: true };
    setBookmarks(next);
    localStorage.setItem("sm_bookmarks", JSON.stringify(next));
  };

  const removeBookmark = (bookId, pageIdx) => {
    const next = { ...bookmarks };
    delete next[`${bookId}_${pageIdx}`];
    setBookmarks(next);
    localStorage.setItem("sm_bookmarks", JSON.stringify(next));
  };

  const saveLastPage = (bookId, pageIdx) => {
    const next = { ...lastPage, [bookId]: pageIdx };
    setLastPage(next);
    localStorage.setItem("sm_lastpage", JSON.stringify(next));
  };

  // ── Local-only CRUD (session preview; the Google Sheet is the source of truth) ──
  const addExam = async (bookId, exam) => {
    const newExam = { ...exam, id: "local_" + Date.now().toString() };
    setExams(prev => ({
      ...prev,
      [bookId]: [...(prev[bookId] || []), newExam].sort((a, b) => a.pageOrder - b.pageOrder),
    }));
    showToast("Added (preview only — add a row in your Sheet to make it permanent) ✓");
  };

  const updateExam = async (bookId, examId, data) => {
    setExams(prev => ({
      ...prev,
      [bookId]: prev[bookId].map(e => e.id === examId ? { ...e, ...data } : e)
        .sort((a, b) => a.pageOrder - b.pageOrder),
    }));
    showToast("Updated (preview only — edit your Sheet to make it permanent) ✓");
  };

  const deleteExam = async (bookId, examId) => {
    setExams(prev => ({
      ...prev,
      [bookId]: prev[bookId].filter(e => e.id !== examId),
    }));
    showToast("Removed from preview", "danger");
  };

  const styles = getStyles(darkMode);

  return (
    <div style={styles.app}>
      {/* Toast */}
      {toast && (
        <div style={{
          position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)",
          background: toast.type === "danger" ? "#EF4444" : "#10B981",
          color: "#fff", padding: "10px 20px", borderRadius: 10,
          fontSize: 13, fontWeight: 700, zIndex: 9999,
          boxShadow: "0 4px 20px rgba(0,0,0,0.2)",
          animation: "fadeInDown 0.3s ease",
          textAlign: "center", maxWidth: "90%",
        }}>
          {toast.msg}
        </div>
      )}

      {view === "library" && (
        <Library
          books={MOCK_BOOKS}
          exams={exams}
          onOpen={(id) => { setSelectedBook(id); setView("book"); }}
          onAdmin={() => setView("admin")}
          darkMode={darkMode}
          onToggleDark={toggleDark}
          styles={styles}
          lastPage={lastPage}
          bookmarks={bookmarks}
          usingSheet={usingSheet}
          sheetLoading={sheetLoading}
        />
      )}
      {view === "book" && selectedBook && (
        <BookReader
          book={MOCK_BOOKS[selectedBook]}
          exams={(exams[selectedBook] || []).filter(e => e.isPublished)}
          onClose={() => setView("library")}
          darkMode={darkMode}
          styles={styles}
          lastPage={lastPage[selectedBook] || 0}
          onPageChange={(p) => saveLastPage(selectedBook, p)}
          bookmarks={bookmarks}
          onBookmark={(p) => saveBookmark(selectedBook, p)}
          onUnbookmark={(p) => removeBookmark(selectedBook, p)}
        />
      )}
      {view === "admin" && (
        <AdminPanel
          isAdmin={isAdmin}
          onLogin={() => setIsAdmin(true)}
          onBack={() => setView("library")}
          exams={exams}
          books={MOCK_BOOKS}
          onAdd={addExam}
          onUpdate={updateExam}
          onDelete={deleteExam}
          styles={styles}
          darkMode={darkMode}
          usingSheet={usingSheet}
          onRefresh={loadFromSheet}
        />
      )}

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .books-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0 48px; justify-items: center; }

        @media (max-width: 520px) { .books-grid { grid-template-columns: repeat(2, 1fr); gap: 0 20px; } }
      `}</style>

}

// BOOK READER
// ═══════════════════════════════════════════════════════════════════════════
function BookReader({ book, exams, onClose, darkMode, styles, lastPage, onPageChange, bookmarks, onBookmark, onUnbookmark }) {
  const [currentPage, setCurrentPage] = useState(lastPage);
  const [turning, setTurning] = useState(null);
  const [showTOC, setShowTOC] = useState(false);
  const touchStart = useRef(null);
  const dark = darkMode;

  const totalPages = exams.length + 1;

  const goTo = useCallback((dir) => {
    if (dir === "next" && currentPage < totalPages - 1) {
      setTurning("next");
      setTimeout(() => {
        const next = currentPage + 1;
        setCurrentPage(next);
        onPageChange(next);
        setTurning(null);
      }, 320);
    } else if (dir === "prev" && currentPage > 0) {
      setTurning("prev");
      setTimeout(() => {
        const next = currentPage - 1;
        setCurrentPage(next);
        onPageChange(next);
        setTurning(null);
      }, 320);
    }
  }, [currentPage, totalPages, onPageChange]);

  const jumpTo = (page) => {
    setCurrentPage(page);
    onPageChange(page);
    setShowTOC(false);
  };

  useEffect(() => {
    const handleKey = (e) => {
      if (e.key === "ArrowRight") goTo("next");
      if (e.key === "ArrowLeft") goTo("prev");
      if (e.key === "Escape") setShowTOC(false);
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [goTo]);

  const onTouchStart = (e) => { touchStart.current = e.touches[0].clientX; };
  const onTouchEnd = (e) => {
    if (touchStart.current === null) return;
    const diff = touchStart.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 45) goTo(diff > 0 ? "next" : "prev");
    touchStart.current = null;
  };

  const currentExam = currentPage === 0 ? null : exams[currentPage - 1];
  const isBookmarked = bookmarks[`${book.id}_${currentPage}`];
  const progressPct = totalPages > 1 ? Math.round((currentPage / (totalPages - 1)) * 100) : 0;

  const pageStyle = {
    transition: "transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s ease",
    transform: turning === "next"
      ? "rotateY(-18deg) scale(0.96)"
      : turning === "prev"
        ? "rotateY(18deg) scale(0.96)"
        : "rotateY(0deg) scale(1)",
    opacity: turning ? 0.55 : 1,
  };

  return (
    <div style={styles.readerWrap} className={dark ? "dark" : ""}>
      {/* Top bar */}
      <div style={styles.readerBar}>
        <button style={styles.backBtn} onClick={onClose}>← Library</button>
        <div style={{ textAlign: "center", flex: 1 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: book.color }}>{book.title}</div>
          <div style={{ fontSize: 10, color: dark ? "#64748B" : "#9CA3AF" }}>
            {currentPage === 0 ? "Cover" : `Page ${currentPage} of ${totalPages - 1}`}
          </div>
        </div>
        <div style={{ display: "flex", gap: 5 }}>
          <button style={styles.iconBtn} onClick={() => setShowTOC(t => !t)} title="Table of Contents">
            📋
          </button>
          {currentPage > 0 && (
            <button
              style={{ ...styles.iconBtn, color: isBookmarked ? "#F59E0B" : (dark ? "#475569" : "#CBD5E1") }}
              onClick={() => isBookmarked ? onUnbookmark(currentPage) : onBookmark(currentPage)}
              title={isBookmarked ? "Remove bookmark" : "Bookmark this page"}
            >
              🔖
            </button>
          )}
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ height: 3, background: dark ? "#1E293B" : "#F3F4F6", flexShrink: 0 }}>
        <div style={{
          height: "100%", width: `${progressPct}%`,
          background: book.color, transition: "width 0.4s ease",
        }} />
      </div>

      {/* Table of Contents overlay */}
      {showTOC && (
        <div style={{
          position: "absolute", top: 56, left: 0, right: 0, zIndex: 50,
          background: dark ? "#0F172A" : "#fff",
          borderBottom: `1px solid ${dark ? "#1E293B" : "#E5E7EB"}`,
          maxHeight: "60vh", overflowY: "auto",
          boxShadow: "0 8px 24px rgba(0,0,0,0.15)",
        }}>
          <div style={{ padding: "12px 16px" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: dark ? "#64748B" : "#9CA3AF", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>
              Table of Contents
            </div>
            {/* Cover */}
            <button
              onClick={() => jumpTo(0)}
              style={{
                display: "flex", alignItems: "center", gap: 10, width: "100%",
                padding: "10px 12px", borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left",
                background: currentPage === 0
                  ? `${book.color}18`
                  : dark ? "#1E293B" : "#F9FAFB",
                color: dark ? "#E2E8F0" : "#1F2937",
                marginBottom: 4,
              }}
            >
              <span style={{ fontSize: 12, fontWeight: 700, color: book.color, minWidth: 28 }}>C</span>
              <span style={{ fontSize: 13, fontWeight: 600 }}>Cover Page</span>
            </button>
            {/* Exams */}
            {exams.map((exam, i) => {
              const tc = TYPE_CONFIG[exam.type] || {};
              const bm = bookmarks[`${book.id}_${i + 1}`];
              return (
                <button
                  key={exam.id}
                  onClick={() => jumpTo(i + 1)}
                  style={{
                    display: "flex", alignItems: "center", gap: 10, width: "100%",
                    padding: "10px 12px", borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left",
                    background: currentPage === i + 1
                      ? `${book.color}18`
                      : dark ? "#1E293B" : "#F9FAFB",
                    color: dark ? "#E2E8F0" : "#1F2937",
                    marginBottom: 4,
                  }}
                >
                  <span style={{ fontSize: 11, fontWeight: 700, color: book.color, minWidth: 28 }}>{i + 1}</span>
                  <span style={{ flex: 1, fontSize: 13, fontWeight: 600 }}>{exam.title}</span>
                  {bm && <span style={{ fontSize: 10 }}>🔖</span>}
                  <span style={{
                    fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5,
                    background: tc.bg || "#F3F4F6", color: tc.text || "#374151",
                    border: `1px solid ${tc.border || "#E5E7EB"}`,
                  }}>{exam.type}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Page */}
      <div
        style={styles.pageContainer}
        onTouchStart={onTouchStart}
        onTouchEnd={onTouchEnd}
      >
        <div style={{ ...styles.page, ...pageStyle }}>
          {/* Page corner fold */}
          <div style={{
            position: "absolute", bottom: 0, right: 0,
            width: 0, height: 0, borderStyle: "solid",
            borderWidth: "0 0 28px 28px",
            borderColor: `transparent transparent ${dark ? "#1E293B" : "#E5E7EB"} transparent`,
          }} />

          {currentPage === 0 ? (
            <CoverPage book={book} exams={exams} dark={dark} />
          ) : currentExam ? (
            <ExamPage
              exam={currentExam}
              book={book}
              pageNum={currentPage}
              dark={dark}
              styles={styles}
            />
          ) : null}
        </div>
      </div>

      {/* Navigation */}
      <div style={styles.navBar}>
        <button
          style={{ ...styles.navBtn, opacity: currentPage === 0 ? 0.3 : 1 }}
          onClick={() => goTo("prev")}
          disabled={currentPage === 0 || !!turning}
        >
          ← Prev
        </button>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: dark ? "#E2E8F0" : "#1F2937" }}>
            {currentPage} / {totalPages - 1}
          </div>
          <div style={{ fontSize: 10, color: dark ? "#64748B" : "#9CA3AF" }}>swipe or tap</div>
        </div>
        <button
          style={{
            ...styles.navBtn,
            opacity: currentPage === totalPages - 1 ? 0.3 : 1,
            background: book.color, color: "#fff", border: "none",
          }}
          onClick={() => goTo("next")}
          disabled={currentPage === totalPages - 1 || !!turning}
        >
          Next →
        </button>
      </div>
    </div>
  );
}
