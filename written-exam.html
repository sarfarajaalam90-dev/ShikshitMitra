function ExamPage({ exam, book, pageNum, dark, styles }) {
  const tc = TYPE_CONFIG[exam.type] || {};
  const [pdfOpen, setPdfOpen] = useState(false);

  // Auto-open PDF reader immediately if this exam has a PDF
  useEffect(() => {
    if (exam.pdfUrl) setPdfOpen(true);
  }, [exam.id]);

  return (
    <div style={{ padding: "24px 20px 44px" }}>
      {/* Book-style PDF reader */}
      {pdfOpen && exam.pdfUrl && (
        <BookPdfReader
          url={exam.pdfUrl}
          accent={book.color}
          examTitle={exam.title}
          examId={exam.id}
          onClose={() => setPdfOpen(false)}
        />
      )}

      {/* Header row */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <span style={{
            fontSize: 10, fontWeight: 700, padding: "3px 9px", borderRadius: 6,
            background: tc.bg || "#F3F4F6", color: tc.text || "#374151",
            border: `1px solid ${tc.border || "#E5E7EB"}`,
          }}>{exam.type}</span>
          {exam.year && (
            <span style={{
              fontSize: 10, fontWeight: 700, padding: "3px 9px", borderRadius: 6,
              background: dark ? "#1E293B" : "#F3F4F6",
              color: dark ? "#94A3B8" : "#6B7280",
              border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
            }}>{exam.year}</span>
          )}
          {exam.isPremium && (
            <span style={{
              fontSize: 10, fontWeight: 700, padding: "3px 9px", borderRadius: 6,
              background: "#FEF9C3", color: "#A16207", border: "1px solid #FDE047",
            }}>⭐ Premium</span>
          )}
        </div>
        <span style={{ fontSize: 10, fontWeight: 700, color: dark ? "#475569" : "#9CA3AF" }}>p.{pageNum}</span>
      </div>

      {/* Title */}
      <h2 style={{
        fontSize: 17, fontWeight: 800, color: book.color,
        margin: "0 0 18px", paddingBottom: 12,
        borderBottom: `2px solid ${book.color}22`,
      }}>
        {exam.title}
      </h2>

      {/* If PDF exists but not open yet (e.g. user closed it), show re-open button */}
      {exam.pdfUrl && !pdfOpen && (
        <button
          onClick={() => setPdfOpen(true)}
          style={{
            display: "flex", alignItems: "center", gap: 10, width: "100%",
            padding: "14px 18px", borderRadius: 12, border: "none",
            background: book.color, color: "#fff",
            fontSize: 14, fontWeight: 800, cursor: "pointer", marginBottom: 20,
            boxShadow: `0 4px 18px ${book.color}55`,
          }}
        >
          <span style={{ fontSize: 20 }}>📖</span>
          <span>Open Book Reader</span>
        </button>
      )}

      {/* Content (optional typed questions) */}
      {exam.content && exam.content.trim() && (
        <div
          className={`exam-content ${dark ? "dark" : ""}`}
          style={{ fontSize: 14, lineHeight: 1.85, color: dark ? "#CBD5E1" : "#1F2937" }}
          dangerouslySetInnerHTML={{ __html: exam.content }}
        />
      )}

      {/* Page number */}
      <div style={{
        textAlign: "center", color: dark ? "#334155" : "#D1D5DB",
        fontSize: 12, marginTop: 30, paddingTop: 14,
        borderTop: `1px solid ${dark ? "#1E293B" : "#F3F4F6"}`,
      }}>
        — {pageNum} —
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// BOOK-STYLE PDF READER — Kindle/Google Play Books experience
// PDF.js renders each page as a canvas. CSS 3D flip animation between pages.
// ═══════════════════════════════════════════════════════════════════════════
function BookPdfReader({ url, accent, examTitle, examId, onClose }) {
  const [pdfDoc, setPdfDoc] = useState(null);
  const [totalPages, setTotalPages] = useState(0);
  const [currentPage, setCurrentPage] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("sm_pdf_lastpage") || "{}");
      return saved[examId] || 1;
    } catch { return 1; }
  });
  const [renderedPages, setRenderedPages] = useState({}); // pageNum → dataURL
  const [loading, setLoading] = useState(true);
  const [loadingPage, setLoadingPage] = useState(false);
  const [error, setError] = useState(null);
  const [pdfJsReady, setPdfJsReady] = useState(false);
  const [flipping, setFlipping] = useState(null); // "next" | "prev" | null
  const [uiVisible, setUiVisible] = useState(true);
  const containerRef = useRef(null);
  const hideTimer = useRef(null);
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);
  // pinch zoom
  const pinchStartDist = useRef(null);
  const pinchStartZoom = useRef(1);
  const [zoom, setZoom] = useState(1);
  const renderQueue = useRef(new Set());

  // ── Lock body scroll ──
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);

  // ── Auto-hide UI ──
  const resetHide = useCallback(() => {
    setUiVisible(true);
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(() => setUiVisible(false), 3500);
  }, []);
  useEffect(() => { resetHide(); return () => clearTimeout(hideTimer.current); }, [resetHide]);

  // ── Save last page ──
  useEffect(() => {
    if (!examId || currentPage < 1) return;
    try {
      const saved = JSON.parse(localStorage.getItem("sm_pdf_lastpage") || "{}");
      saved[examId] = currentPage;
      localStorage.setItem("sm_pdf_lastpage", JSON.stringify(saved));
    } catch {}
  }, [examId, currentPage]);

  // ── Load PDF.js ──
  useEffect(() => {
    if (window.pdfjsLib) { setPdfJsReady(true); return; }
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      setPdfJsReady(true);
    };
    s.onerror = () => setError("Failed to load PDF engine.");
    document.head.appendChild(s);
  }, []);

  // ── Render a single PDF page to a dataURL ──
  const renderPageToDataUrl = useCallback(async (doc, pageNum, widthPx) => {
    if (renderQueue.current.has(pageNum)) return;
    renderQueue.current.add(pageNum);
    try {
      const page = await doc.getPage(pageNum);
      const baseVP = page.getViewport({ scale: 1 });
      const scale = widthPx / baseVP.width;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      await page.render({ canvasContext: ctx, viewport }).promise;
      const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
      setRenderedPages(prev => ({ ...prev, [pageNum]: dataUrl }));
    } catch (e) {
      console.warn("render page error", e);
    } finally {
      renderQueue.current.delete(pageNum);
    }
  }, []);

  // ── Load PDF document ──
  useEffect(() => {
    if (!pdfJsReady || !url) return;
    const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const directUrl = m ? `https://drive.google.com/uc?export=download&id=${m[1]}` : url;
    setLoading(true); setError(null); setPdfDoc(null); setRenderedPages({});
    window.pdfjsLib.getDocument({ url: directUrl, withCredentials: false }).promise
      .then(doc => {
        setPdfDoc(doc);
        setTotalPages(doc.numPages);
        setLoading(false);
      })
      .catch(() => { setError("cors"); setLoading(false); });
  }, [pdfJsReady, url]);

  // ── Render current + adjacent pages when doc or page changes ──
  useEffect(() => {
    if (!pdfDoc || !containerRef.current) return;
    const w = Math.min(containerRef.current.offsetWidth - 32, 480) * window.devicePixelRatio;
    // Render current, next, prev
    [currentPage - 1, currentPage, currentPage + 1, currentPage + 2].forEach(p => {
      if (p >= 1 && p <= totalPages && !renderedPages[p]) {
        renderPageToDataUrl(pdfDoc, p, w);
      }
    });
  }, [pdfDoc, currentPage, totalPages, renderPageToDataUrl]);

  // ── Navigation with flip animation ──
  const goPage = useCallback((dir) => {
    if (flipping) return;
    const next = dir === "next" ? currentPage + 1 : currentPage - 1;
    if (next < 1 || next > totalPages) return;
    setFlipping(dir);
    setLoadingPage(!renderedPages[next]);
    setTimeout(() => {
      setCurrentPage(next);
      setFlipping(null);
      setLoadingPage(false);
      resetHide();
    }, 400);
  }, [flipping, currentPage, totalPages, renderedPages, resetHide]);

  // ── Keyboard ──
  useEffect(() => {
    const h = (e) => {
      if (e.key === "ArrowRight") goPage("next");
      if (e.key === "ArrowLeft") goPage("prev");
      if (e.key === "Escape") onClose();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [goPage, onClose]);

  // ── Swipe gesture ──
  const onTouchStart = (e) => {
    if (e.touches.length === 1) {
      touchStartX.current = e.touches[0].clientX;
      touchStartY.current = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartDist.current = Math.sqrt(dx * dx + dy * dy);
      pinchStartZoom.current = zoom;
    }
  };
  const onTouchMove = (e) => {
    if (e.touches.length === 2 && pinchStartDist.current) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const ratio = dist / pinchStartDist.current;
      setZoom(Math.min(3, Math.max(0.5, pinchStartZoom.current * ratio)));
      e.preventDefault();
    }
  };
  const onTouchEnd = (e) => {
    if (e.changedTouches.length === 1 && touchStartX.current !== null) {
      const dx = touchStartX.current - e.changedTouches[0].clientX;
      const dy = Math.abs(e.changedTouches[0].clientY - touchStartY.current);
      if (Math.abs(dx) > 50 && dy < 80) {
        goPage(dx > 0 ? "next" : "prev");
      } else {
        resetHide();
      }
    }
    pinchStartDist.current = null;
    touchStartX.current = null;
  };

  const m = url && url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const openLink = m ? `https://drive.google.com/file/d/${m[1]}/view` : url;
  const progress = totalPages > 0 ? Math.round((currentPage / totalPages) * 100) : 0;

  // ── CORS fallback ──
  if (error === "cors") {
    return (
      <div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "#FEFDF8", display: "flex", flexDirection: "column" }}>
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "12px 16px",
          background: "#fff", borderBottom: "1px solid #E5E7EB",
        }}>
          <button onClick={onClose} style={{ padding: "6px 14px", borderRadius: 8, border: "none", background: accent, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>✕ Close</button>
          <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: "#1F2937", textAlign: "center" }}>{examTitle}</div>
          <a href={openLink} target="_blank" rel="noopener noreferrer" style={{ padding: "6px 14px", borderRadius: 8, border: `1px solid ${accent}`, color: accent, fontWeight: 700, fontSize: 12, textDecoration: "none" }}>⬡ Open</a>
        </div>
        <iframe src={url} title={examTitle} style={{ flex: 1, border: "none" }} allow="autoplay" />
      </div>
    );
  }

  const currentImgSrc = renderedPages[currentPage];
  const nextImgSrc = renderedPages[currentPage + 1];

  return (
    <div
      ref={containerRef}
      style={{ position: "fixed", inset: 0, zIndex: 1000, background: "#E8E0D0", display: "flex", flexDirection: "column", userSelect: "none", fontFamily: "'Plus Jakarta Sans', system-ui, sans-serif" }}
      onMouseMove={resetHide}
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
      onClick={resetHide}
    >
      {/* ── TOP BAR ── */}
      <div style={{
        position: "absolute", top: 0, left: 0, right: 0, zIndex: 20,
        display: "flex", alignItems: "center", gap: 8, padding: "10px 14px",
        background: "rgba(255,253,248,0.95)", backdropFilter: "blur(12px)",
        borderBottom: "1px solid rgba(0,0,0,0.08)",
        transition: "opacity 0.3s ease",
        opacity: uiVisible ? 1 : 0, pointerEvents: uiVisible ? "auto" : "none",
      }}>
        <button
          onClick={onClose}
          style={{ padding: "7px 14px", borderRadius: 8, border: "none", background: accent, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13, flexShrink: 0 }}
        >← Back</button>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#1F2937", lineHeight: 1.2 }}>{examTitle}</div>
          <div style={{ fontSize: 10, color: "#9CA3AF", marginTop: 1 }}>
            {totalPages > 0 ? `Page ${currentPage} of ${totalPages}` : "Loading…"}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0 }}>
          <button
            onClick={() => setZoom(z => Math.max(0.5, z - 0.25))}
            style={{ padding: "5px 10px", borderRadius: 7, border: "1px solid #E5E7EB", background: "#fff", cursor: "pointer", fontSize: 15, fontWeight: 700, color: "#374151" }}
          >−</button>
          <span style={{ fontSize: 11, fontWeight: 700, color: "#6B7280", minWidth: 36, textAlign: "center" }}>{Math.round(zoom * 100)}%</span>
          <button
            onClick={() => setZoom(z => Math.min(3, z + 0.25))}
            style={{ padding: "5px 10px", borderRadius: 7, border: "1px solid #E5E7EB", background: "#fff", cursor: "pointer", fontSize: 15, fontWeight: 700, color: "#374151" }}
          >+</button>
          <button
            onClick={() => setZoom(1)}
            style={{ padding: "5px 10px", borderRadius: 7, border: "1px solid #E5E7EB", background: "#fff", cursor: "pointer", fontSize: 11, fontWeight: 700, color: "#374151" }}
          >Fit</button>
        </div>
      </div>

      {/* ── READING AREA ── */}
      <div style={{
        flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
        padding: "70px 20px 80px", overflow: "hidden", position: "relative",
      }}>
        {/* Paper texture background */}
        <div style={{
          position: "absolute", inset: 0,
          backgroundImage: `radial-gradient(circle at 30% 50%, #DDD5C4 0%, #C8BCA8 100%)`,
          backgroundSize: "cover",
        }} />

        {/* Initial loading */}
        {loading && (
          <div style={{
            position: "relative", zIndex: 5, display: "flex", flexDirection: "column",
            alignItems: "center", gap: 16,
          }}>
            <div style={{
              width: 48, height: 48, borderRadius: "50%",
              border: "3px solid rgba(0,0,0,0.1)", borderTopColor: accent,
              animation: "sm-spin 0.8s linear infinite",
            }} />
            <div style={{ fontSize: 13, fontWeight: 700, color: "#6B7280" }}>Opening book…</div>
          </div>
        )}

        {/* ── PAGE FLIP STAGE ── */}
        {!loading && (
          <div style={{
            position: "relative", zIndex: 2,
            width: "100%", maxWidth: 520,
            perspective: 1200,
          }}>
            {/* The page itself */}
            <div style={{
              position: "relative",
              transformStyle: "preserve-3d",
              transition: flipping
                ? "transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)"
                : "transform 0.15s ease",
              transform: flipping === "next"
                ? "rotateY(-25deg) scale(0.97)"
                : flipping === "prev"
                  ? "rotateY(25deg) scale(0.97)"
                  : "rotateY(0deg) scale(1)",
              transformOrigin: flipping === "next" ? "left center" : "right center",
            }}>
              {/* Book shadow beneath */}
              <div style={{
                position: "absolute", bottom: -16, left: "5%", right: "5%", height: 30,
                background: "rgba(0,0,0,0.25)",
                filter: "blur(14px)", borderRadius: "50%", zIndex: -1,
              }} />

              {/* Page wrapper */}
              <div style={{
                background: "#FEFDF8",
                borderRadius: "1px 6px 6px 1px",
                overflow: "hidden",
                boxShadow: flipping
                  ? "0 20px 60px rgba(0,0,0,0.45), 12px 0 30px rgba(0,0,0,0.2), -2px 0 0 #DDD5C4"
                  : "0 12px 40px rgba(0,0,0,0.3), 6px 0 20px rgba(0,0,0,0.12), -2px 0 0 #C8BCA8",
                position: "relative",
                transform: `scale(${zoom})`,
                transformOrigin: "center top",
                transition: "box-shadow 0.3s ease",
              }}>
                {/* Left binding shadow */}
                <div style={{
                  position: "absolute", left: 0, top: 0, bottom: 0, width: 18, zIndex: 3,
                  background: "linear-gradient(to right, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0.04) 60%, transparent 100%)",
                  pointerEvents: "none",
                }} />
                {/* Top page curl shadow */}
                <div style={{
                  position: "absolute", top: 0, left: 0, right: 0, height: 8, zIndex: 3,
                  background: "linear-gradient(to bottom, rgba(0,0,0,0.06) 0%, transparent 100%)",
                  pointerEvents: "none",
                }} />

                {/* Page image */}
                {currentImgSrc ? (
                  <img
                    src={currentImgSrc}
                    alt={`Page ${currentPage}`}
                    style={{
                      display: "block", width: "100%", height: "auto",
                      imageRendering: "crisp-edges",
                    }}
                    draggable={false}
                  />
                ) : (
                  /* Skeleton while rendering */
                  <div style={{
                    paddingTop: "141.4%", background: "#FEFDF8",
                    position: "relative",
                  }}>
                    <div style={{
                      position: "absolute", inset: 0, display: "flex",
                      alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12,
                    }}>
                      <div style={{
                        width: 36, height: 36, borderRadius: "50%",
                        border: "3px solid rgba(0,0,0,0.08)", borderTopColor: accent,
                        animation: "sm-spin 0.8s linear infinite",
                      }} />
                      <div style={{ fontSize: 12, color: "#9CA3AF", fontWeight: 600 }}>Rendering page {currentPage}…</div>
                    </div>
                  </div>
                )}
              </div>

              {/* Next page peek (depth illusion) */}
              {nextImgSrc && !flipping && (
                <div style={{
                  position: "absolute", top: 3, right: -4, bottom: -3, left: 4,
                  background: "#F5F0E8", borderRadius: "1px 6px 6px 1px",
                  zIndex: -1,
                  boxShadow: "4px 0 12px rgba(0,0,0,0.15)",
                  overflow: "hidden",
                }}>
                  <img src={nextImgSrc} alt="" style={{ display: "block", width: "100%", height: "auto", opacity: 0.4 }} draggable={false} />
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── TAP ZONES ── */}
        {!loading && totalPages > 0 && (
          <>
            {/* Left tap */}
            <div
              onClick={(e) => { e.stopPropagation(); goPage("prev"); }}
              style={{
                position: "absolute", left: 0, top: 0, bottom: 0, width: "22%",
                cursor: currentPage > 1 ? "pointer" : "default", zIndex: 10,
                display: "flex", alignItems: "center", justifyContent: "flex-start",
                paddingLeft: 8,
              }}
            >
              {currentPage > 1 && uiVisible && (
                <div style={{
                  width: 36, height: 36, borderRadius: "50%",
                  background: "rgba(0,0,0,0.18)", backdropFilter: "blur(6px)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 18, color: "#fff", fontWeight: 700,
                  transition: "opacity 0.3s",
                }}>‹</div>
              )}
            </div>
            {/* Right tap */}
            <div
              onClick={(e) => { e.stopPropagation(); goPage("next"); }}
              style={{
                position: "absolute", right: 0, top: 0, bottom: 0, width: "22%",
                cursor: currentPage < totalPages ? "pointer" : "default", zIndex: 10,
                display: "flex", alignItems: "center", justifyContent: "flex-end",
                paddingRight: 8,
              }}
            >
              {currentPage < totalPages && uiVisible && (
                <div style={{
                  width: 36, height: 36, borderRadius: "50%",
                  background: "rgba(0,0,0,0.18)", backdropFilter: "blur(6px)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 18, color: "#fff", fontWeight: 700,
                }}>›</div>
              )}
            </div>
          </>
        )}
      </div>

      {/* ── BOTTOM BAR ── */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0, zIndex: 20,
        padding: "10px 16px 14px",
        background: "rgba(255,253,248,0.95)", backdropFilter: "blur(12px)",
        borderTop: "1px solid rgba(0,0,0,0.08)",
        transition: "opacity 0.3s ease",
        opacity: uiVisible ? 1 : 0, pointerEvents: uiVisible ? "auto" : "none",
      }}>
        {/* Progress bar */}
        <div style={{ height: 3, background: "rgba(0,0,0,0.1)", borderRadius: 99, marginBottom: 10, overflow: "hidden" }}>
          <div style={{
            height: "100%", width: `${progress}%`,
            background: accent, borderRadius: 99,
            transition: "width 0.4s ease",
          }} />
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
          <button
            onClick={() => goPage("prev")}
            disabled={currentPage <= 1 || !!flipping}
            style={{
              padding: "9px 18px", borderRadius: 8,
              border: "1px solid rgba(0,0,0,0.12)",
              background: "#fff", color: "#374151",
              fontSize: 13, fontWeight: 700, cursor: currentPage <= 1 ? "default" : "pointer",
              opacity: currentPage <= 1 ? 0.35 : 1,
            }}
          >← Prev</button>

          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 800, color: "#1F2937" }}>
              {currentPage} <span style={{ color: "#9CA3AF", fontWeight: 400 }}>/</span> {totalPages}
            </div>
            <div style={{ fontSize: 10, color: "#9CA3AF" }}>
              {progress}% read · swipe or tap edges
            </div>
          </div>

          <button
            onClick={() => goPage("next")}
            disabled={currentPage >= totalPages || !!flipping}
            style={{
              padding: "9px 18px", borderRadius: 8, border: "none",
              background: accent, color: "#fff",
              fontSize: 13, fontWeight: 700, cursor: currentPage >= totalPages ? "default" : "pointer",
              opacity: currentPage >= totalPages ? 0.35 : 1,
              boxShadow: `0 3px 10px ${accent}55`,
            }}
          >Next →</button>
        </div>
      </div>
    </div>
  );
}

// ─── OLD PDF VIEWER (kept for reference, replaced above) ──────────────────
function PdfViewer({ url, dark, accent, examTitle, onClose, examId }) {
  const canvasRef = useRef(null);
  const scrollRef = useRef(null);
  const thumbContainerRef = useRef(null);

  // Detect viewport width for auto spread mode
  const isWide = window.innerWidth >= 900;
  const isTablet = window.innerWidth >= 600;

  const [pdfDoc, setPdfDoc] = useState(null);
  const [currentPdfPage, setCurrentPdfPage] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("sm_pdf_lastpage") || "{}");
      return saved[examId] || 1;
    } catch { return 1; }
  });
  const [totalPdfPages, setTotalPdfPages] = useState(0);
  // fitMode: "width" | "page" | "custom"
  const [fitMode, setFitMode] = useState("width");
  const [zoom, setZoom] = useState(1.0);
  const [loading, setLoading] = useState(true);
  const [renderLoading, setRenderLoading] = useState(false);
  const [error, setError] = useState(null);
  const [pdfJsReady, setPdfJsReady] = useState(false);
  const [uiVisible, setUiVisible] = useState(true);
  const [isTwoPage, setIsTwoPage] = useState(isWide);
  const [showThumbs, setShowThumbs] = useState(false);
  const [thumbs, setThumbs] = useState({});
  const [pageInput, setPageInput] = useState("");
  const [editingPage, setEditingPage] = useState(false);
  const rightCanvasRef = useRef(null);
  const renderTaskRef = useRef(null);
  const renderTaskRightRef = useRef(null);
  const hideTimer = useRef(null);
  const touchStartX = useRef(null);

  // Lock body scroll
  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);

  // Save last page per exam
  useEffect(() => {
    if (!examId || currentPdfPage < 1) return;
    try {
      const saved = JSON.parse(localStorage.getItem("sm_pdf_lastpage") || "{}");
      saved[examId] = currentPdfPage;
      localStorage.setItem("sm_pdf_lastpage", JSON.stringify(saved));
    } catch {}
  }, [examId, currentPdfPage]);

  // Auto-hide UI
  const resetHideTimer = useCallback(() => {
    setUiVisible(true);
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(() => setUiVisible(false), 3500);
  }, []);
  useEffect(() => {
    resetHideTimer();
    return () => clearTimeout(hideTimer.current);
  }, [resetHideTimer]);

  // Inject pdf.js
  useEffect(() => {
    if (window.pdfjsLib) { setPdfJsReady(true); return; }
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    script.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      setPdfJsReady(true);
    };
    script.onerror = () => setError("Failed to load PDF engine.");
    document.head.appendChild(script);
  }, []);

  // Load PDF
  useEffect(() => {
    if (!pdfJsReady || !url) return;
    const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    const directUrl = m ? `https://drive.google.com/uc?export=download&id=${m[1]}` : url;
    setLoading(true); setError(null); setPdfDoc(null);
    window.pdfjsLib.getDocument({ url: directUrl, withCredentials: false }).promise
      .then(doc => {
        setPdfDoc(doc);
        setTotalPdfPages(doc.numPages);
        setLoading(false);
      })
      .catch(() => { setError("cors_fallback"); setLoading(false); });
  }, [pdfJsReady, url]);

  // Core render function
  const renderPage = useCallback(async (doc, pageNum, canvasEl, containerW, zoomLevel, fMode) => {
    if (!doc || !canvasEl || pageNum < 1 || pageNum > doc.numPages) return null;
    try {
      const page = await doc.getPage(pageNum);
      const baseVP = page.getViewport({ scale: 1 });
      let scale;
      if (fMode === "page") {
        // Fit the entire page height within the visible area
        const containerH = (scrollRef.current?.offsetHeight || 600) - 120;
        const scaleW = containerW / baseVP.width;
        const scaleH = containerH / baseVP.height;
        scale = Math.min(scaleW, scaleH) * zoomLevel;
      } else {
        // Fit to width (default)
        scale = (containerW / baseVP.width) * zoomLevel;
      }
      const viewport = page.getViewport({ scale });
      const dpr = window.devicePixelRatio || 1;
      canvasEl.width = Math.floor(viewport.width * dpr);
      canvasEl.height = Math.floor(viewport.height * dpr);
      canvasEl.style.width = viewport.width + "px";
      canvasEl.style.height = viewport.height + "px";
      const ctx = canvasEl.getContext("2d");
      ctx.scale(dpr, dpr);
      ctx.fillStyle = "#FFFFFF";
      ctx.fillRect(0, 0, viewport.width, viewport.height);
      const task = page.render({ canvasContext: ctx, viewport });
      return task;
    } catch { return null; }
  }, []);

  // Trigger render on page/zoom/layout change
  useEffect(() => {
    if (!pdfDoc || !canvasRef.current || !scrollRef.current) return;
    setRenderLoading(true);

    const thumbbarW = showThumbs && isTablet ? 88 : 0;
    const available = scrollRef.current.offsetWidth - thumbbarW;
    const gap = isTwoPage ? 12 : 0;
    const singleW = isTwoPage
      ? Math.floor((available - gap - 48) / 2)
      : available - 48;

    if (renderTaskRef.current) { try { renderTaskRef.current.cancel(); } catch {} }

    renderPage(pdfDoc, currentPdfPage, canvasRef.current, singleW, zoom, fitMode)
      .then(task => {
        renderTaskRef.current = task;
        if (task) task.promise.then(() => setRenderLoading(false)).catch(() => setRenderLoading(false));
        else setRenderLoading(false);
      })
      .catch(() => setRenderLoading(false));

    // Right page for spread view
    if (isTwoPage && rightCanvasRef.current && currentPdfPage + 1 <= totalPdfPages) {
      if (renderTaskRightRef.current) { try { renderTaskRightRef.current.cancel(); } catch {} }
      renderPage(pdfDoc, currentPdfPage + 1, rightCanvasRef.current, singleW, zoom, fitMode)
        .then(task => { renderTaskRightRef.current = task; });
    }
  }, [pdfDoc, currentPdfPage, zoom, isTwoPage, fitMode, showThumbs, renderPage, totalPdfPages, isTablet]);

  // Generate thumbnails lazily when thumb panel opens
  useEffect(() => {
    if (!showThumbs || !pdfDoc) return;
    const generate = async () => {
      const newThumbs = { ...thumbs };
      for (let i = 1; i <= totalPdfPages; i++) {
        if (newThumbs[i]) continue;
        try {
          const page = await pdfDoc.getPage(i);
          const vp = page.getViewport({ scale: 0.18 });
          const c = document.createElement("canvas");
          c.width = vp.width; c.height = vp.height;
          const ctx = c.getContext("2d");
          ctx.fillStyle = "#fff";
          ctx.fillRect(0, 0, c.width, c.height);
          await page.render({ canvasContext: ctx, viewport: vp }).promise;
          newThumbs[i] = c.toDataURL();
          setThumbs({ ...newThumbs });
        } catch {}
      }
    };
    generate();
  }, [showThumbs, pdfDoc, totalPdfPages]);

  // Scroll active thumb into view
  useEffect(() => {
    if (!showThumbs || !thumbContainerRef.current) return;
    const active = thumbContainerRef.current.querySelector(`[data-thumb="${currentPdfPage}"]`);
    if (active) active.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, [currentPdfPage, showThumbs]);

  const goPage = useCallback((dir) => {
    const step = isTwoPage ? 2 : 1;
    setCurrentPdfPage(p => dir === "next"
      ? Math.min(totalPdfPages, p + step)
      : Math.max(1, p - step));
    resetHideTimer();
  }, [isTwoPage, totalPdfPages, resetHideTimer]);

  // Keyboard nav
  useEffect(() => {
    const handler = (e) => {
      if (editingPage) return;
      if (e.key === "ArrowRight" || e.key === "ArrowDown" || e.key === "PageDown") goPage("next");
      if (e.key === "ArrowLeft"  || e.key === "ArrowUp"   || e.key === "PageUp")   goPage("prev");
      if (e.key === "Escape") onClose && onClose();
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [goPage, onClose, editingPage]);

  // Touch swipe
  const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
  const handleTouchEnd = (e) => {
    if (touchStartX.current === null) return;
    const diff = touchStartX.current - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goPage(diff > 0 ? "next" : "prev");
    touchStartX.current = null;
    resetHideTimer();
  };

  // Page jump input
  const commitPageJump = () => {
    const n = parseInt(pageInput, 10);
    if (n >= 1 && n <= totalPdfPages) setCurrentPdfPage(n);
    setEditingPage(false);
    setPageInput("");
  };

  const m = url && url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const openLink = m ? `https://drive.google.com/file/d/${m[1]}/view` : url;

  const tb = (extra = {}) => ({
    background: "rgba(255,255,255,0.12)", border: "1px solid rgba(255,255,255,0.18)",
    color: "#fff", borderRadius: 8, cursor: "pointer", fontWeight: 700,
    fontSize: 13, padding: "6px 13px", backdropFilter: "blur(8px)",
    transition: "background 0.15s", flexShrink: 0,
    ...extra,
  });

  const progressPct = totalPdfPages > 1 ? ((currentPdfPage - 1) / (totalPdfPages - 1)) * 100 : 0;

  // ── CORS FALLBACK (iframe) ──
  if (error === "cors_fallback") {
    return (
      <div style={{ position: "fixed", inset: 0, zIndex: 1000, background: "#111827", display: "flex", flexDirection: "column" }}
        onMouseMove={resetHideTimer} onClick={resetHideTimer}>
        <div style={{
          display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", flexShrink: 0,
          background: "rgba(0,0,0,0.85)", backdropFilter: "blur(12px)",
          borderBottom: "1px solid rgba(255,255,255,0.08)",
          transition: "opacity 0.3s", opacity: uiVisible ? 1 : 0, pointerEvents: uiVisible ? "auto" : "none",
        }}>
          <button style={tb()} onClick={onClose}>✕ Close</button>
          <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: "#E2E8F0", textAlign: "center" }}>{examTitle}</div>
          <a href={openLink} target="_blank" rel="noopener noreferrer" style={{ ...tb(), textDecoration: "none" }}>Open ↗</a>
        </div>
        <iframe src={url} title="Exam PDF" style={{ flex: 1, border: "none", background: "#fff" }} allow="autoplay" />
      </div>
    );
  }

  return (
    <div
      style={{ position: "fixed", inset: 0, zIndex: 1000, background: "#1a1a2e", display: "flex", flexDirection: "column", userSelect: "none" }}
      onMouseMove={resetHideTimer}
      onTouchStart={handleTouchStart}
      onTouchEnd={handleTouchEnd}
    >
      {/* ══ TOP BAR ══ */}
      <div style={{
        display: "flex", alignItems: "center", gap: 8, padding: "0 12px",
        height: 50, flexShrink: 0,
        background: "rgba(10,10,20,0.92)", backdropFilter: "blur(20px)",
        borderBottom: "1px solid rgba(255,255,255,0.08)",
        transition: "opacity 0.35s", opacity: uiVisible ? 1 : 0, pointerEvents: uiVisible ? "auto" : "none",
        zIndex: 20,
      }}>
        {/* Close */}
        <button style={tb({ padding: "5px 10px", fontSize: 14 })} onClick={onClose} title="Close (Esc)">✕</button>

        {/* Title */}
        <div style={{ flex: 1, textAlign: "center", minWidth: 0 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#E2E8F0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {examTitle}
          </div>
        </div>

        {/* Thumbnails toggle */}
        <button
          style={tb({ background: showThumbs ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.12)", padding: "5px 10px", fontSize: 12 })}
          onClick={() => { setShowThumbs(t => !t); resetHideTimer(); }}
          title="Toggle thumbnail panel"
        >⊞</button>

        {/* View toggle */}
        <button
          style={tb({ background: isTwoPage ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.12)", padding: "5px 10px", fontSize: 11 })}
          onClick={() => { setIsTwoPage(t => !t); resetHideTimer(); }}
          title={isTwoPage ? "Single page" : "Book spread"}
        >{isTwoPage ? "▭" : "▭▭"}</button>

        {/* Open externally */}
        <a href={openLink} target="_blank" rel="noopener noreferrer"
          style={{ ...tb({ padding: "5px 10px", fontSize: 11, textDecoration: "none" }) }}>↗</a>
      </div>

      {/* ══ PROGRESS BAR ══ */}
      <div style={{ height: 2, background: "rgba(255,255,255,0.06)", flexShrink: 0 }}>
        <div style={{ height: "100%", width: `${progressPct}%`, background: accent || "#1a6b3c", transition: "width 0.3s ease" }} />
      </div>

      {/* ══ MAIN BODY: thumbs + canvas ══ */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* ── THUMBNAIL PANEL ── */}
        {showThumbs && isTablet && (
          <div
            ref={thumbContainerRef}
            style={{
              width: 96, flexShrink: 0, overflowY: "auto", overflowX: "hidden",
              background: "rgba(0,0,0,0.5)", borderRight: "1px solid rgba(255,255,255,0.07)",
              padding: "8px 6px", display: "flex", flexDirection: "column", gap: 8,
            }}
          >
            {Array.from({ length: totalPdfPages }, (_, i) => i + 1).map(n => (
              <div
                key={n}
                data-thumb={n}
                onClick={() => { setCurrentPdfPage(n); resetHideTimer(); }}
                style={{
                  cursor: "pointer", borderRadius: 4, overflow: "hidden",
                  border: n === currentPdfPage
                    ? `2px solid ${accent || "#1a6b3c"}`
                    : "2px solid rgba(255,255,255,0.1)",
                  transition: "border-color 0.2s, transform 0.15s",
                  transform: n === currentPdfPage ? "scale(1.03)" : "scale(1)",
                  background: "#fff",
                  position: "relative",
                }}
              >
                {thumbs[n]
                  ? <img src={thumbs[n]} alt={`Page ${n}`} style={{ display: "block", width: "100%", height: "auto" }} />
                  : <div style={{ height: 60, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <div style={{ width: 16, height: 16, borderRadius: "50%", border: "2px solid rgba(255,255,255,0.2)", borderTopColor: "#fff", animation: "sm-spin 0.8s linear infinite" }} />
                    </div>
                }
                <div style={{
                  position: "absolute", bottom: 0, left: 0, right: 0,
                  background: n === currentPdfPage ? (accent || "#1a6b3c") : "rgba(0,0,0,0.55)",
                  color: "#fff", fontSize: 9, fontWeight: 700, textAlign: "center", padding: "2px 0",
                }}>{n}</div>
              </div>
            ))}
          </div>
        )}

        {/* ── CANVAS SCROLL AREA ── */}
        <div
          ref={scrollRef}
          style={{
            flex: 1, overflowY: "auto", overflowX: "hidden",
            display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "flex-start",
            background: "#2a2a3e",
            padding: "24px 20px 90px",
          }}
        >
          {/* Initial loading spinner */}
          {loading && (
            <div style={{
              position: "absolute", inset: 0, display: "flex", flexDirection: "column",
              alignItems: "center", justifyContent: "center", gap: 16, zIndex: 5,
            }}>
              <div style={{
                width: 44, height: 44, borderRadius: "50%",
                border: "3px solid rgba(255,255,255,0.1)",
                borderTopColor: accent || "#1a6b3c",
                animation: "sm-spin 0.8s linear infinite",
              }} />
              <div style={{ fontSize: 13, color: "#94A3B8", fontWeight: 600 }}>
                {pdfDoc ? "Rendering page…" : "Loading PDF…"}
              </div>
            </div>
          )}

          {/* ── BOOK SPREAD WRAPPER ── */}
          <div style={{
            display: "flex", flexDirection: "row",
            alignItems: "flex-start", justifyContent: "center",
            gap: 0,
            opacity: loading ? 0.2 : 1, transition: "opacity 0.25s",
            position: "relative",
            maxWidth: isTwoPage ? 1400 : 900,
            width: "100%",
          }}>
            {/* Left / single page */}
            <div style={{
              background: "#fff",
              borderRadius: isTwoPage ? "4px 0 0 4px" : 4,
              boxShadow: isTwoPage
                ? "0 12px 60px rgba(0,0,0,0.6), 4px 0 12px rgba(0,0,0,0.3)"
                : "0 12px 60px rgba(0,0,0,0.6), 0 2px 12px rgba(0,0,0,0.4)",
              overflow: "hidden",
              flex: isTwoPage ? "1 1 0" : "0 0 auto",
              width: isTwoPage ? undefined : "100%",
              maxWidth: isTwoPage ? undefined : 820,
            }}>
              <canvas ref={canvasRef} style={{ display: "block", width: "100%", height: "auto" }} />
            </div>

            {/* Center gutter shadow for book spread */}
            {isTwoPage && currentPdfPage + 1 <= totalPdfPages && (
              <div style={{
                width: 14, flexShrink: 0,
                background: "linear-gradient(to right, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.35) 100%)",
                alignSelf: "stretch", zIndex: 2,
              }} />
            )}

            {/* Right page (book spread) */}
            {isTwoPage && currentPdfPage + 1 <= totalPdfPages && (
              <div style={{
                background: "#fff",
                borderRadius: "0 4px 4px 0",
                boxShadow: "-4px 0 12px rgba(0,0,0,0.3), 0 12px 60px rgba(0,0,0,0.6)",
                overflow: "hidden",
                flex: "1 1 0",
              }}>
                <canvas ref={rightCanvasRef} style={{ display: "block", width: "100%", height: "auto" }} />
              </div>
            )}

            {/* Render loading overlay (subtle) */}
            {renderLoading && !loading && (
              <div style={{
                position: "absolute", top: 8, right: 8,
                width: 22, height: 22, borderRadius: "50%",
                border: "2px solid rgba(255,255,255,0.15)",
                borderTopColor: accent || "#1a6b3c",
                animation: "sm-spin 0.7s linear infinite",
                zIndex: 10,
              }} />
            )}
          </div>
        </div>
      </div>

      {/* ══ SIDE NAV ARROWS (fixed, semi-transparent) ══ */}
      {currentPdfPage > 1 && (
        <button
          onClick={(e) => { e.stopPropagation(); goPage("prev"); }}
          style={{
            position: "fixed", left: showThumbs && isTablet ? 108 : 8, top: "50%",
            transform: "translateY(-50%)",
            ...tb({ padding: "12px 10px", fontSize: 22, borderRadius: 10, zIndex: 20,
              background: "rgba(0,0,0,0.55)", border: "1px solid rgba(255,255,255,0.14)" }),
            opacity: uiVisible ? 1 : 0, transition: "opacity 0.35s",
          }}
        >‹</button>
      )}
      {currentPdfPage < totalPdfPages && (
        <button
          onClick={(e) => { e.stopPropagation(); goPage("next"); }}
          style={{
            position: "fixed", right: 8, top: "50%", transform: "translateY(-50%)",
            ...tb({ padding: "12px 10px", fontSize: 22, borderRadius: 10, zIndex: 20,
              background: "rgba(0,0,0,0.55)", border: "1px solid rgba(255,255,255,0.14)" }),
            opacity: uiVisible ? 1 : 0, transition: "opacity 0.35s",
          }}
        >›</button>
      )}

      {/* ══ BOTTOM TOOLBAR ══ */}
      <div
        onClick={e => e.stopPropagation()}
        style={{
          position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 30,
          display: "flex", alignItems: "center", justifyContent: "center",
          gap: 6, padding: "10px 14px",
          background: "rgba(8,8,20,0.88)", backdropFilter: "blur(20px)",
          borderTop: "1px solid rgba(255,255,255,0.07)",
          transition: "opacity 0.35s", flexWrap: "wrap",
          opacity: uiVisible ? 1 : 0, pointerEvents: uiVisible ? "auto" : "none",
        }}
      >
        {/* Zoom controls */}
        <button style={tb({ padding: "5px 10px", fontSize: 16 })} onClick={() => { setZoom(z => Math.max(0.3, z - 0.15)); setFitMode("custom"); resetHideTimer(); }}>−</button>
        <span style={{ fontSize: 11, fontWeight: 700, color: "#94A3B8", minWidth: 38, textAlign: "center" }}>
          {Math.round(zoom * 100)}%
        </span>
        <button style={tb({ padding: "5px 10px", fontSize: 16 })} onClick={() => { setZoom(z => Math.min(3.5, z + 0.15)); setFitMode("custom"); resetHideTimer(); }}>+</button>

        <div style={{ width: 1, height: 20, background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />

        {/* Fit modes */}
        <button
          style={tb({ fontSize: 10, padding: "5px 9px", background: fitMode === "width" ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.1)" })}
          onClick={() => { setFitMode("width"); setZoom(1.0); resetHideTimer(); }}
          title="Fit to width"
        >↔ Width</button>
        <button
          style={tb({ fontSize: 10, padding: "5px 9px", background: fitMode === "page" ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.1)" })}
          onClick={() => { setFitMode("page"); setZoom(1.0); resetHideTimer(); }}
          title="Fit full page"
        >⤢ Page</button>

        <div style={{ width: 1, height: 20, background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />

        {/* Page navigation */}
        <button
          style={{ ...tb({ padding: "5px 10px" }), opacity: currentPdfPage <= 1 ? 0.3 : 1 }}
          onClick={() => goPage("prev")} disabled={currentPdfPage <= 1}
        >← Prev</button>

        {/* Page number — click to jump */}
        {editingPage ? (
          <input
            autoFocus
            type="number"
            min={1} max={totalPdfPages}
            value={pageInput}
            onChange={e => setPageInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") commitPageJump(); if (e.key === "Escape") { setEditingPage(false); setPageInput(""); } }}
            onBlur={commitPageJump}
            style={{
              width: 50, padding: "4px 6px", borderRadius: 6, border: "1px solid rgba(255,255,255,0.3)",
              background: "rgba(255,255,255,0.15)", color: "#fff", fontSize: 12, fontWeight: 700,
              textAlign: "center", outline: "none",
            }}
          />
        ) : (
          <span
            onClick={() => { setEditingPage(true); setPageInput(String(currentPdfPage)); resetHideTimer(); }}
            style={{
              fontSize: 12, fontWeight: 700, color: "#E2E8F0",
              minWidth: 58, textAlign: "center", cursor: "pointer",
              background: "rgba(255,255,255,0.1)", padding: "5px 10px",
              borderRadius: 8, border: "1px solid rgba(255,255,255,0.15)",
            }}
            title="Click to jump to page"
          >
            {currentPdfPage}{isTwoPage && currentPdfPage + 1 <= totalPdfPages ? `–${currentPdfPage + 1}` : ""} / {totalPdfPages}
          </span>
        )}

        <button
          style={{ ...tb({ padding: "5px 10px", background: `${accent}88` }), opacity: currentPdfPage >= totalPdfPages ? 0.3 : 1 }}
          onClick={() => goPage("next")} disabled={currentPdfPage >= totalPdfPages}
        >Next →</button>

        <div style={{ width: 1, height: 20, background: "rgba(255,255,255,0.1)", margin: "0 2px" }} />

        {/* Spread toggle */}
        <button
          style={tb({ fontSize: 10, padding: "5px 9px", background: isTwoPage ? "rgba(255,255,255,0.22)" : "rgba(255,255,255,0.1)" })}
          onClick={() => { setIsTwoPage(t => !t); resetHideTimer(); }}
          title={isTwoPage ? "Switch to single page" : "Switch to book spread"}
        >{isTwoPage ? "▭ Single" : "▭▭ Spread"}
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// RICH TEXT EDITOR
// ═══════════════════════════════════════════════════════════════════════════
function RichEditor({ value, onChange, dark }) {
  const editorRef = useRef(null);
  const [mode, setMode] = useState("visual"); // visual | html

  const exec = (cmd, val = null) => {
    editorRef.current?.focus();
    document.execCommand(cmd, false, val);
    syncFromEditor();
  };

  const syncFromEditor = () => {
    if (editorRef.current) onChange(editorRef.current.innerHTML);
  };

  useEffect(() => {
    if (editorRef.current && mode === "visual") {
      if (editorRef.current.innerHTML !== value) {
        editorRef.current.innerHTML = value || "";
      }
    }
  }, [mode]);

  const toolbarBtnStyle = (active) => ({
    padding: "4px 8px", fontSize: 12, borderRadius: 5, cursor: "pointer",
    border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
    background: active ? (dark ? "#334155" : "#E5E7EB") : "transparent",
    color: dark ? "#E2E8F0" : "#374151",
    fontWeight: 600,
  });

  return (
    <div style={{ border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, borderRadius: 8, overflow: "hidden" }}>
      {/* Toolbar */}
      <div style={{
        display: "flex", gap: 4, padding: "8px 10px", flexWrap: "wrap",
        background: dark ? "#1E293B" : "#F9FAFB",
        borderBottom: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
        alignItems: "center",
      }}>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("bold"); }} title="Bold"><strong>B</strong></button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("italic"); }} title="Italic"><em>I</em></button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("underline"); }} title="Underline"><u>U</u></button>
        <div style={{ width: 1, height: 20, background: dark ? "#334155" : "#E5E7EB", margin: "0 2px" }} />
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("formatBlock", "h3"); }} title="Heading">H3</button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("formatBlock", "p"); }} title="Paragraph">¶</button>
        <div style={{ width: 1, height: 20, background: dark ? "#334155" : "#E5E7EB", margin: "0 2px" }} />
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("insertUnorderedList"); }} title="List">• List</button>
        <button style={toolbarBtnStyle(false)} onMouseDown={e => { e.preventDefault(); exec("insertHorizontalRule"); }} title="Divider">─</button>
        <div style={{ flex: 1 }} />
        <button
          style={{ ...toolbarBtnStyle(mode === "html"), fontSize: 10 }}
          onClick={() => {
            if (mode === "visual") {
              setMode("html");
            } else {
              setMode("visual");
            }
          }}
        >
          {mode === "visual" ? "</> HTML" : "Visual"}
        </button>
      </div>

      {/* Editor area */}
      {mode === "visual" ? (
        <div
          ref={editorRef}
          contentEditable
          suppressContentEditableWarning
          onInput={syncFromEditor}
          style={{
            minHeight: 200, padding: "14px", outline: "none",
            fontSize: 14, lineHeight: 1.8,
            color: dark ? "#E2E8F0" : "#1F2937",
            background: dark ? "#0F172A" : "#fff",
          }}
        />
      ) : (
        <textarea
          value={value}
          onChange={e => onChange(e.target.value)}
          style={{
            width: "100%", minHeight: 200, padding: "14px",
            border: "none", outline: "none", resize: "vertical",
            fontFamily: "monospace", fontSize: 12, lineHeight: 1.6,
            color: dark ? "#E2E8F0" : "#374151",
            background: dark ? "#0F172A" : "#fff",
          }}
        />
      )}

      {/* Preview */}
      {value && (
        <div style={{
          borderTop: `1px solid ${dark ? "#1E293B" : "#F3F4F6"}`,
          padding: "10px 14px",
          background: dark ? "#0F172A" : "#FEFDF8",
        }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: dark ? "#475569" : "#9CA3AF", marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>
            Preview
          </div>
          <div
            className={`exam-content ${dark ? "dark" : ""}`}
            style={{ fontSize: 13, lineHeight: 1.8, color: dark ? "#CBD5E1" : "#374151" }}
            dangerouslySetInnerHTML={{ __html: value }}
          />
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// ADMIN PANEL
// ═══════════════════════════════════════════════════════════════════════════
function AdminPanel({ isAdmin, onLogin, onBack, exams, books, onAdd, onUpdate, onDelete, styles, darkMode, usingSheet, onRefresh }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [adminView, setAdminView] = useState("list");
  const [editingExam, setEditingExam] = useState(null);
  const [selectedBook, setSelectedBook] = useState("second-paper");
  const [form, setForm] = useState({
    title: "", type: "Model Set", year: "", content: "", pdfUrl: "",
    pageOrder: 1, isPremium: false, isPublished: true,
  });
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const dark = darkMode;

  const handleLogin = () => {
    if (pw === ADMIN_PASSWORD) { onLogin(); setErr(""); }
    else setErr("Incorrect password. Try again.");
  };

  const openAdd = () => {
    const bookExams = exams[selectedBook] || [];
    setForm({
      title: "", type: "Model Set", year: "",
      content: "<p><strong>प्र.१.</strong> Question here <em>(marks)</em></p>",
      pdfUrl: "",
      pageOrder: bookExams.length + 1,
      isPremium: false, isPublished: true,
    });
    setEditingExam(null);
    setAdminView("form");
  };

  const openEdit = (exam) => {
    setForm({ ...exam });
    setEditingExam(exam.id);
    setAdminView("form");
  };

  const handleSave = async () => {
    if (!form.title.trim()) return;
    setSaving(true);
    if (editingExam) await onUpdate(selectedBook, editingExam, form);
    else await onAdd(selectedBook, form);
    setSaving(false);
    setSaved(true);
    setTimeout(() => { setSaved(false); setAdminView("list"); }, 900);
  };

  const handleDelete = async (examId) => {
    await onDelete(selectedBook, examId);
    setDeleteConfirm(null);
  };

  const inputStyle = {
    width: "100%", padding: "10px 12px", borderRadius: 8,
    border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
    background: dark ? "#1E293B" : "#fff",
    color: dark ? "#E2E8F0" : "#1F2937",
    fontSize: 14, outline: "none",
  };
  const selectStyle = { ...inputStyle };
  const labelStyle = {
    display: "block", fontSize: 11, fontWeight: 700,
    color: dark ? "#64748B" : "#9CA3AF",
    marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.5,
  };

  if (!isAdmin) {
    return (
      <div style={{ minHeight: "100vh", background: dark ? "#0F172A" : "#F8F7F2", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{
          width: 320, background: dark ? "#1E293B" : "#fff",
          borderRadius: 16, padding: "36px 28px", textAlign: "center",
          boxShadow: "0 8px 32px rgba(0,0,0,0.12)",
          border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
        }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🔐</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: dark ? "#F1F5F9" : "#1F2937", marginBottom: 6 }}>Admin Access</div>
          <div style={{ fontSize: 13, color: dark ? "#64748B" : "#9CA3AF", marginBottom: 24 }}>
            Enter admin password to manage books
          </div>
          <input
            type="password"
            value={pw}
            onChange={e => setPw(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            placeholder="Admin password"
            style={{ ...inputStyle, marginBottom: 8 }}
          />
          {err && <div style={{ color: "#EF4444", fontSize: 13, marginBottom: 10 }}>{err}</div>}
          <button
            style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: "#1A6B3C", color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer", marginTop: 4 }}
            onClick={handleLogin}
          >Login →</button>
          <button
            style={{ width: "100%", padding: "10px", borderRadius: 8, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 13, cursor: "pointer", marginTop: 8 }}
            onClick={onBack}
          >← Back to Library</button>
        </div>
      </div>
    );
  }

  // Form view
  if (adminView === "form") {
    return (
      <div style={{ minHeight: "100vh", background: dark ? "#0F172A" : "#F8F7F2" }} className={dark ? "dark" : ""}>
        {/* Header */}
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: "14px 16px", background: dark ? "#1E293B" : "#fff",
          borderBottom: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
          position: "sticky", top: 0, zIndex: 10,
        }}>
          <button style={styles.backBtn} onClick={() => setAdminView("list")}>← Back</button>
          <div style={{ fontWeight: 700, color: dark ? "#F1F5F9" : "#1F2937" }}>
            {editingExam ? "✏️ Edit Exam" : "➕ Add New Exam"}
          </div>
          <div style={{ fontSize: 10, color: dark ? "#64748B" : "#9CA3AF" }}>
            📝 Preview only
          </div>
        </div>

        <div style={{ padding: "16px", maxWidth: 480 }}>
          {/* Book selector */}
          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>Book</label>
            <select style={selectStyle} value={selectedBook} onChange={e => setSelectedBook(e.target.value)}>
              <option value="second-paper">📕 Kharidar Second Paper</option>
              <option value="third-paper">📗 Kharidar Third Paper</option>
            </select>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>Exam Title</label>
            <input
              style={inputStyle}
              value={form.title}
              onChange={e => setForm(f => ({ ...f, title: e.target.value }))}
              placeholder="e.g. Model Set 15 or PYQ 2080"
            />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
            <div>
              <label style={labelStyle}>Type</label>
              <select style={selectStyle} value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
                <option>PYQ</option>
                <option>Model Set</option>
                <option>Practice Set</option>
                <option>Special Set</option>
              </select>
            </div>
            <div>
              <label style={labelStyle}>Year (optional)</label>
              <input
                style={inputStyle}
                value={form.year || ""}
                onChange={e => setForm(f => ({ ...f, year: e.target.value }))}
                placeholder="e.g. 2079"
              />
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>PDF URL (optional)</label>
            <input
              style={inputStyle}
              value={form.pdfUrl || ""}
              onChange={e => setForm(f => ({ ...f, pdfUrl: e.target.value }))}
              placeholder="Google Drive share link to the exam PDF"
            />
            <div style={{ fontSize: 10, color: dark ? "#475569" : "#9CA3AF", marginTop: 5 }}>
              Paste a normal Google Drive "share" link — it'll be converted to an embeddable preview automatically.
            </div>
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={labelStyle}>Content (optional notes)</label>
            <RichEditor
              value={form.content}
              onChange={content => setForm(f => ({ ...f, content }))}
              dark={dark}
            />
            <div style={{ fontSize: 10, color: dark ? "#475569" : "#9CA3AF", marginTop: 5 }}>
              Tip: Use H3 for sections, Bold for question numbers, Italic for marks. Leave empty if you're only embedding a PDF.
            </div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 20 }}>
            <div>
              <label style={labelStyle}>Page Order</label>
              <input
                type="number"
                style={inputStyle}
                value={form.pageOrder}
                onChange={e => setForm(f => ({ ...f, pageOrder: parseInt(e.target.value) || 1 }))}
              />
            </div>
            <div>
              <label style={labelStyle}>Premium</label>
              <select style={selectStyle} value={form.isPremium ? "yes" : "no"} onChange={e => setForm(f => ({ ...f, isPremium: e.target.value === "yes" }))}>
                <option value="no">Free</option>
                <option value="yes">⭐ Premium</option>
              </select>
            </div>
            <div>
              <label style={labelStyle}>Status</label>
              <select style={selectStyle} value={form.isPublished ? "pub" : "draft"} onChange={e => setForm(f => ({ ...f, isPublished: e.target.value === "pub" }))}>
                <option value="pub">✅ Published</option>
                <option value="draft">📝 Draft</option>
              </select>
            </div>
          </div>

          <button
            style={{
              width: "100%", padding: "13px", borderRadius: 8, border: "none",
              background: saved ? "#10B981" : "#1A6B3C",
              color: "#fff", fontSize: 14, fontWeight: 700,
              cursor: saving || saved ? "default" : "pointer",
              transition: "background 0.3s",
            }}
            onClick={handleSave}
            disabled={saving || saved}
          >
            {saving ? "Saving to Firestore..." : saved ? "✅ Saved!" : editingExam ? "Update Exam" : "Save New Exam"}
          </button>
        </div>
      </div>
    );
  }

  // List view
  const bookExams = exams[selectedBook] || [];
  const book = books[selectedBook];

  return (
    <div style={{ minHeight: "100vh", background: dark ? "#0F172A" : "#F8F7F2" }} className={dark ? "dark" : ""}>
      {/* Header */}
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "14px 16px", background: dark ? "#1E293B" : "#fff",
        borderBottom: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
        position: "sticky", top: 0, zIndex: 10,
      }}>
        <button style={styles.backBtn} onClick={onBack}>← Library</button>
        <div style={{ fontWeight: 700, color: dark ? "#F1F5F9" : "#1F2937" }}>📋 Admin</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ fontSize: 10, color: usingSheet ? "#10B981" : "#F59E0B", fontWeight: 700 }}>
            {usingSheet ? "📊 Sheet" : "📦 Sample Data"}
          </div>
          <button
            onClick={onRefresh}
            title="Reload from Google Sheet"
            style={{ ...styles.iconBtn, width: 28, height: 28, fontSize: 12 }}
          >🔄</button>
        </div>
      </div>

      <div style={{ padding: "12px 16px 0" }}>
        <div style={{
          fontSize: 11, lineHeight: 1.6, padding: "10px 12px", borderRadius: 8,
          background: dark ? "#1E293B" : "#FFF8E1",
          border: `1px solid ${dark ? "#334155" : "#FDE68A"}`,
          color: dark ? "#FCD34D" : "#92400E",
        }}>
          📊 Exam pages are loaded from your Google Sheet. Edits below are a <strong>local preview only</strong> — to make permanent changes, edit the Sheet and tap 🔄 Refresh.
        </div>
      </div>

      <div style={{ padding: "16px 16px 0" }}>
        {/* Book tabs */}
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {Object.values(books).map(b => (
            <button key={b.id} onClick={() => setSelectedBook(b.id)} style={{
              flex: 1, padding: "9px 10px", borderRadius: 8, cursor: "pointer",
              border: `2px solid ${selectedBook === b.id ? b.color : (dark ? "#334155" : "#E5E7EB")}`,
              background: selectedBook === b.id ? `${b.color}15` : (dark ? "#1E293B" : "#F9FAFB"),
              color: selectedBook === b.id ? b.color : (dark ? "#94A3B8" : "#6B7280"),
              fontSize: 11, fontWeight: 700,
            }}>
              {b.emoji} {b.title.replace("Kharidar ", "")}
            </button>
          ))}
        </div>

        {/* Stats row */}
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {[
            { label: "Total", val: bookExams.length, color: book.color },
            { label: "Published", val: bookExams.filter(e => e.isPublished).length, color: "#10B981" },
            { label: "Premium", val: bookExams.filter(e => e.isPremium).length, color: "#F59E0B" },
            { label: "Draft", val: bookExams.filter(e => !e.isPublished).length, color: "#6B7280" },
          ].map(s => (
            <div key={s.label} style={{
              flex: 1, textAlign: "center", padding: "8px 4px",
              background: dark ? "#1E293B" : "#fff",
              borderRadius: 8, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
            }}>
              <div style={{ fontSize: 18, fontWeight: 800, color: s.color }}>{s.val}</div>
              <div style={{ fontSize: 9, color: dark ? "#64748B" : "#9CA3AF", fontWeight: 600 }}>{s.label}</div>

        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
          <button
            style={{
              padding: "9px 16px", borderRadius: 8, border: "none",
              background: book.color, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer",
            }}
            onClick={openAdd}
          >
            + Add New Exam Page
          </button>
        </div>
      </div>

      {/* Exam list */}
      <div style={{ padding: "0 16px 80px" }}>
        {bookExams.length === 0 ? (
          <div style={{ textAlign: "center", padding: 48, color: dark ? "#475569" : "#9CA3AF" }}>
            <div style={{ fontSize: 36, marginBottom: 12 }}>📄</div>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 6 }}>No exam pages yet</div>
            <div style={{ fontSize: 13 }}>Add your first exam page above</div>
          </div>
        ) : bookExams.map(exam => {
          const tc = TYPE_CONFIG[exam.type] || {};
          return (
            <div key={exam.id} style={{
              background: dark ? "#1E293B" : "#fff",
              border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`,
              borderRadius: 10, padding: "12px", marginBottom: 10,
              borderLeft: `3px solid ${tc.dot || book.color}`,
            }}>
              {/* Delete confirm */}
              {deleteConfirm === exam.id ? (
                <div style={{ textAlign: "center", padding: "8px 0" }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#EF4444", marginBottom: 10 }}>
                    Delete "{exam.title}"?
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button style={{ flex: 1, padding: "8px", borderRadius: 7, border: "none", background: "#EF4444", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }} onClick={() => handleDelete(exam.id)}>
                      Yes, Delete
                    </button>
                    <button style={{ flex: 1, padding: "8px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 13, cursor: "pointer" }} onClick={() => setDeleteConfirm(null)}>
                      Cancel
                    </button>
                  </div>
                </div>
              ) : (
                <>
                  <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <div style={{
                      width: 30, height: 30, borderRadius: 7, flexShrink: 0,
                      background: `${book.color}20`, color: book.color,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontWeight: 800, fontSize: 12,
                    }}>{exam.pageOrder}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14, color: dark ? "#F1F5F9" : "#1F2937", marginBottom: 5 }}>
                        {exam.title}
                      </div>
                      <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: tc.bg || "#F3F4F6", color: tc.text || "#374151", border: `1px solid ${tc.border || "#E5E7EB"}` }}>{exam.type}</span>
                        {exam.year && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: dark ? "#0F172A" : "#F3F4F6", color: dark ? "#94A3B8" : "#6B7280", border: `1px solid ${dark ? "#1E293B" : "#E5E7EB"}` }}>{exam.year}</span>}
                        <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: exam.isPublished ? "#D1FAE5" : "#FEF3C7", color: exam.isPublished ? "#065F46" : "#92400E", border: `1px solid ${exam.isPublished ? "#A7F3D0" : "#FDE68A"}` }}>
                          {exam.isPublished ? "✅ Published" : "📝 Draft"}
                        </span>
                        {exam.isPremium && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 5, background: "#FEF9C3", color: "#A16207", border: "1px solid #FDE047" }}>⭐ Premium</span>}
                      </div>
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
                    <button style={{ flex: 1, padding: "7px 6px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 11, cursor: "pointer", fontWeight: 600 }}
                      onClick={() => onUpdate(selectedBook, exam.id, { isPublished: !exam.isPublished })}>
                      {exam.isPublished ? "Unpublish" : "Publish"}
                    </button>
                    <button style={{ flex: 1, padding: "7px 6px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: dark ? "#94A3B8" : "#6B7280", fontSize: 11, cursor: "pointer", fontWeight: 600 }}
                      onClick={() => onUpdate(selectedBook, exam.id, { isPremium: !exam.isPremium })}>
                      {exam.isPremium ? "Make Free" : "★ Premium"}
                    </button>
                    <button style={{ flex: 1, padding: "7px 6px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: "#2563EB", fontSize: 11, cursor: "pointer", fontWeight: 700 }}
                      onClick={() => openEdit(exam)}>
                      Edit
                    </button>
                    <button style={{ padding: "7px 10px", borderRadius: 7, border: `1px solid ${dark ? "#334155" : "#E5E7EB"}`, background: "transparent", color: "#EF4444", fontSize: 13, cursor: "pointer" }}
                      onClick={() => setDeleteConfirm(exam.id)}>
                      🗑
                    </button>
                  </div>
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function getStyles(dark) {
  const bg = dark ? "#0F172A" : "#F4F1EA";
  const card = dark ? "#1E293B" : "#FFFFFF";
  const text = dark ? "#F1F5F9" : "#1F2937";
  const muted = dark ? "#64748B" : "#6B7280";
  const border = dark ? "#1E293B" : "#E5E7EB";
  const pageBg = dark ? "#111827" : "#FEFDF8";
