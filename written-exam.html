<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>शिक्षित मित्र — Shikshit Mitra</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --surface: #1a1927;
    --surface2: #23213a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #fffffe;
    --text2: #a7a3c0;
    --text3: #6b6882;
    --accent: #6c63d5;
    --accent2: #8b84f0;
    --gold: #f2c94c;
    --teal: #1db37a;
    --coral: #e05c3a;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,14,23,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: var(--text2); letter-spacing: 0.04em; text-transform: uppercase; }

  .header-right { display: flex; gap: 8px; align-items: center; }
  .tag-pill {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    background: rgba(108,99,213,0.15); color: var(--accent2);
    border: 1px solid rgba(108,99,213,0.3);
  }

  /* HERO */
  .hero {
    padding: 3rem 2rem 2rem;
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }
  .hero h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 0.75rem;
  }
  .hero h1 span { color: var(--accent2); }
  .hero p { font-size: 15px; color: var(--text2); line-height: 1.6; }

  /* SHELF SECTION */
  .shelf-section { padding: 2rem; max-width: 960px; margin: 0 auto; }
  .section-eyebrow {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text3); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px;
  }
  .section-eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* BOOKS HORIZONTAL */
  .books-row {
    display: flex;
    gap: 24px;
    padding-bottom: 1rem;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }

  .book-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; cursor: pointer; flex-shrink: 0;
  }

  .book {
    width: 120px; height: 168px;
    border-radius: 4px 12px 12px 4px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 14px 10px;
    position: relative;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border-left: 7px solid rgba(0,0,0,0.25);
    cursor: pointer;
  }
  .book:hover { transform: translateY(-10px) rotate(-1deg); }
  .book-second { background: linear-gradient(145deg, #534AB7, #3C3489); box-shadow: 6px 6px 20px rgba(83,74,183,0.35); }
  .book-third  { background: linear-gradient(145deg, #0F6E56, #085041); box-shadow: 6px 6px 20px rgba(15,110,86,0.35); }
  .book-officer{ background: linear-gradient(145deg, #993C1D, #712B13); box-shadow: 6px 6px 20px rgba(153,60,29,0.35); }
  .book-default{ background: linear-gradient(145deg, #185FA5, #0C447C); box-shadow: 6px 6px 20px rgba(24,95,165,0.35); }

  .book-gloss {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
    border-radius: 4px 12px 12px 4px;
    pointer-events: none;
  }
  .book-label-top { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.7; color: #fff; }
  .book-title-text { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
  .book-bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .book-year { font-size: 10px; color: rgba(255,255,255,0.6); }
  .book-pro-badge {
    font-size: 8px; padding: 2px 5px; border-radius: 3px;
    background: var(--gold); color: #1a1200; font-weight: 700; letter-spacing: 0.05em;
  }
  .book-pages-badge {
    font-size: 9px; padding: 2px 6px; border-radius: 3px;
    background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.8);
  }

  .book-name {
    font-size: 13px; font-weight: 600; text-align: center;
    color: var(--text); line-height: 1.3; max-width: 110px;
  }
  .book-type { font-size: 11px; color: var(--text3); text-align: center; }

  /* SHELF PLANK */
  .shelf-plank {
    height: 14px;
    background: linear-gradient(180deg, #6B4C2A 0%, #3e2a12 100%);
    border-radius: 2px;
    margin-top: 4px;
    box-shadow: 0 6px 12px rgba(0,0,0,0.4);
  }

  /* LOADING / ERROR */
  .status-msg {
    padding: 2rem; text-align: center; color: var(--text2); font-size: 14px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* VIEWER MODAL */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 999;
    align-items: center; justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    width: 100%; max-width: 880px;
    height: 90vh;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-header-left { display: flex; flex-direction: column; gap: 2px; }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-header .modal-sub { font-size: 12px; color: var(--text2); }
  .modal-close {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--surface2); color: var(--text); }

  .modal-tabs {
    display: flex; gap: 6px; padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto; flex-shrink: 0;
    scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
  }
  .modal-tab {
    padding: 6px 14px; font-size: 12px; border-radius: 8px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: all 0.15s;
  }
  .modal-tab:hover { background: var(--surface2); color: var(--text); }
  .modal-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .modal-body { flex: 1; overflow: hidden; position: relative; }
  .modal-body iframe { width: 100%; height: 100%; border: none; display: block; }
  .modal-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 12px; color: var(--text2); font-size: 14px;
  }
  .modal-empty svg { opacity: 0.3; }
  .open-link-btn {
    margin-top: 8px; padding: 8px 18px; border-radius: 8px;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; text-decoration: none; display: inline-block;
  }

  /* FOOTER */
  footer {
    padding: 2rem; text-align: center;
    font-size: 12px; color: var(--text3);
    border-top: 1px solid var(--border); margin-top: 3rem;
  }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    .hero { padding: 2rem 1rem 1rem; }
    .shelf-section { padding: 1rem; }
    .book { width: 96px; height: 136px; }
    .modal { height: 95vh; border-radius: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📚</div>
    <div>
      <div class="logo-text">शिक्षित मित्र</div>
      <div class="logo-sub">Civil Service Prep</div>
    </div>
  </div>
  <div class="header-right">
    <span class="tag-pill">लोक सेवा</span>
  </div>
</header>

<div class="hero">
  <h1>Your <span>Study Library</span><br>for Civil Service</h1>
  <p>Click any book below to read chapters, past questions, and study materials.</p>
</div>

<div class="shelf-section">
  <div class="section-eyebrow">पुस्तकहरू &mdash; Books</div>
  <div id="shelfRow" class="books-row">
    <div class="status-msg"><div class="spinner"></div> Loading library...</div>
  </div>
  <div class="shelf-plank"></div>
</div>

<!-- VIEWER MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <h2 id="modalTitle">Book</h2>
        <span class="modal-sub" id="modalSub"></span>
      </div>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    </div>
    <div class="modal-tabs" id="modalTabs"></div>
    <div class="modal-body" id="modalBody">
      <div class="modal-empty"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<footer>शिक्षित मित्र &mdash; Shikshit Mitra &copy; 2081 &bull; लोक सेवा आयोग तयारी</footer>

<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5svv38RZ1MJ54P73voMTXWZYuNZZeU6Hy4uWsXS95Z0BcydyeRsQINcY8gzVyKYNCeQoM8u3gs7E_/pub?output=csv';

const BOOK_CONFIG = {
  'second-paper': {
    cssClass: 'book-second',
    label: 'खरिदार',
    title: 'दोस्रो पत्र\n(2nd Paper)',
    displayName: 'Kharidar Second Paper',
  },
  'third-paper': {
    cssClass: 'book-third',
    label: 'खरिदार',
    title: 'तेस्रो पत्र\n(3rd Paper)',
    displayName: 'Kharidar Third Paper',
  },
  'officer-paper': {
    cssClass: 'book-officer',
    label: 'अफिसर',
    title: 'लिखित\n(Written)',
    displayName: 'Officer Written Paper',
  },
};

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(1).map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g, '').trim());
    return obj;
  }).filter(r => r.Book);
}

let library = {};

async function init() {
  const shelf = document.getElementById('shelfRow');
  try {
    const res = await fetch(SHEET_CSV);
    if (!res.ok) throw new Error('Network error');
    const text = await res.text();
    const rows = parseCSV(text);
    rows.forEach(row => {
      if (!library[row.Book]) library[row.Book] = [];
      library[row.Book].push(row);
    });
    renderShelf();
  } catch (e) {
    shelf.innerHTML = '<div class="status-msg" style="color:#e05c3a">⚠️ Could not load library. Check your internet connection.</div>';
  }
}

function renderShelf() {
  const shelf = document.getElementById('shelfRow');
  const bookKeys = Object.keys(library);
  if (!bookKeys.length) {
    shelf.innerHTML = '<div class="status-msg">No books found.</div>';
    return;
  }
  shelf.innerHTML = '';
  bookKeys.forEach(key => {
    const pages = library[key];
    const cfg = BOOK_CONFIG[key] || { cssClass: 'book-default', label: '', title: key, displayName: key };
    const pubCount = pages.filter(p => p.Published === 'yes').length;
    const hasPro = pages.some(p => p.Premium === 'yes');
    const firstYear = pages.find(p => p.Year)?.Year || '';
    const wrap = document.createElement('div');
    wrap.className = 'book-wrap';
    wrap.setAttribute('role', 'button');
    wrap.setAttribute('tabindex', '0');
    wrap.setAttribute('aria-label', 'Open ' + cfg.displayName);
    const titleLines = cfg.title.split('\n');
    wrap.innerHTML = `
      <div class="book ${cfg.cssClass}" title="${cfg.displayName}">
        <div class="book-gloss"></div>
        <div>
          <div class="book-label-top">${cfg.label}</div>
          <div class="book-title-text">${titleLines[0]}<br><span style="opacity:0.8;font-size:11px">${titleLines[1]||''}</span></div>
        </div>
        <div class="book-bottom">
          <span class="book-year">${firstYear}</span>
          ${hasPro ? '<span class="book-pro-badge">PRO</span>' : ''}
          <span class="book-pages-badge">${pubCount} ch</span>
        </div>
      </div>
      <div class="book-name">${cfg.displayName.replace(' Paper','<br>Paper')}</div>
      <div class="book-type">${pubCount} chapter${pubCount !== 1 ? 's' : ''}</div>
    `;
    wrap.onclick = () => openBook(key);
    wrap.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') openBook(key); };
    shelf.appendChild(wrap);
  });
}

function openBook(key) {
  const pages = library[key];
  const cfg = BOOK_CONFIG[key] || { displayName: key };
  const published = pages
    .filter(p => p.Published === 'yes' && p.PdfUrl)
    .sort((a, b) => parseInt(a['Page Order'] || 0) - parseInt(b['Page Order'] || 0));

  document.getElementById('modalTitle').textContent = cfg.displayName;
  document.getElementById('modalSub').textContent = published.length + ' published chapter' + (published.length !== 1 ? 's' : '');

  const tabsEl = document.getElementById('modalTabs');
  const bodyEl = document.getElementById('modalBody');
  tabsEl.innerHTML = '';
  bodyEl.innerHTML = '';

  if (!published.length) {
    bodyEl.innerHTML = `<div class="modal-empty"><svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg><span>No published chapters yet.</span></div>`;
    document.getElementById('overlay').classList.add('open');
    return;
  }

  published.forEach((page, i) => {
    const btn = document.createElement('button');
    btn.className = 'modal-tab' + (i === 0 ? ' active' : '');
    btn.textContent = page.Title || (page.Type ? page.Type.toUpperCase() : 'Chapter ' + (i + 1));
    if (page.Year) btn.textContent += ' ' + page.Year;
    btn.onclick = () => {
      document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      loadFrame(page.PdfUrl, bodyEl, cfg.displayName);
    };
    tabsEl.appendChild(btn);
  });

  loadFrame(published[0].PdfUrl, bodyEl, cfg.displayName);
  document.getElementById('overlay').classList.add('open');
}

function loadFrame(url, container, title) {
  container.innerHTML = '<div class="modal-empty"><div class="spinner"></div></div>';
  const iframe = document.createElement('iframe');
  iframe.src = url;
  iframe.title = title;
  iframe.allow = 'fullscreen';
  iframe.onload = () => {};
  iframe.onerror = () => showFallback(url, container);
  container.innerHTML = '';
  container.appendChild(iframe);
}

function showFallback(url, container) {
  container.innerHTML = `<div class="modal-empty">
    <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
    <span>Cannot embed this content.</span>
    <a class="open-link-btn" href="${url}" target="_blank" rel="noopener">Open in New Tab ↗</a>
  </div>`;
}

document.getElementById('modalClose').onclick = closeModal;
document.getElementById('overlay').onclick = function(e) { if (e.target === this) closeModal(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modalBody').innerHTML = '';
}

init();
</script>
</body>
</html>
