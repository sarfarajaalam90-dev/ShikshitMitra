<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shikshit Mitra — Typing Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#ffffff;
  --surface:#f8fafc;
  --surface2:#f1f5f9;
  --border:#e2e8f0;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --primary:#16a34a;
  --primary-dim:rgba(22,163,74,.10);
  --red:#dc2626;
  --red-dim:rgba(220,38,38,.10);
  --yellow:#ca8a04;
  --blue:#2563eb;
  --radius:14px;
  --radius-sm:9px;
}

html,body{
  font-family:'Sora',sans-serif;
  background:#ffffff;
  color:var(--text);
  min-height:100vh;
  width:100%;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
}

/* ── Main wrapper — fixed laptop width, centered ── */
.wrap{
  position:relative;z-index:1;
  width:100%;
  max-width:1500px;
  margin:0 auto;
  padding:20px 24px 32px;
}

@media (min-width:1200px){
  .wrap{padding:28px 48px 44px;}
}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
  flex-wrap:nowrap;
  gap:10px;
}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0;min-width:0;}
.brand-icon{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#166534,#22c55e);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.brand-name{font-size:15px;font-weight:800;letter-spacing:-.3px;white-space:nowrap;}
.brand-sub{font-size:10px;color:var(--text2);font-weight:400;margin-top:1px;white-space:nowrap;}

.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ── Sound icon button (icon only) ── */
#sound-toggle{
  width:34px;height:34px;
  background:var(--surface);border:1px solid var(--border);border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .2s;flex-shrink:0;
}
#sound-toggle.muted{color:var(--text3);border-color:var(--text3);}

/* ── Language toggle ── */
.lang-toggle{
  display:flex;gap:4px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:99px;padding:4px;
  flex-shrink:0;
}
.lang-btn{
  padding:6px 14px;border-radius:99px;border:none;
  font-family:'Sora',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;
  color:var(--text2);background:transparent;
  white-space:nowrap;
}
.lang-btn.active{background:var(--primary);color:#000;}

/* ── Slim progress bar (green line) ── */
.timer-bar-track{
  height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;
  margin-bottom:10px;
}
.timer-bar-fill{
  height:100%;background:var(--primary);border-radius:99px;
  transition:width .9s linear, background .3s;
  width:100%;
}
.timer-bar-fill.warn{background:var(--yellow);}
.timer-bar-fill.danger{background:var(--red);}

/* ── Duration row (below green line) — timer chip on right ── */
.duration-row{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
  margin-bottom:16px;
  flex-wrap:nowrap;
}
.duration-left{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  min-width:0;
}
.duration-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.dpill{
  padding:4px 12px;border-radius:99px;
  border:1px solid var(--border);
  background:transparent;color:var(--text2);
  font-family:'Sora',sans-serif;font-size:11px;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.dpill.active{border-color:var(--primary);color:var(--primary);background:var(--primary-dim);}

/* ── Timer chip — right side of duration row ── */
.timer-chip{
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.timer-display{
  font-family:'Space Mono',monospace;
  font-size:14px;font-weight:700;
  color:var(--primary);
  line-height:1;
  transition:color .3s;
  letter-spacing:.5px;
  min-width:36px;text-align:right;
}
.timer-display.warn{color:var(--yellow);}
.timer-display.danger{color:var(--red);}

.timer-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--primary);flex-shrink:0;
  transition:background .3s;
}
.timer-dot.warn{background:var(--yellow);}
.timer-dot.danger{background:var(--red);}
.timer-dot.pulse{animation:dotPulse 1s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* ── Passage box ── */
.passage-box{
  background:#ffffff;
  border:1.5px solid var(--border);
  border-radius:var(--radius);padding:20px;
  margin-bottom:14px;
  position:relative;overflow:hidden;
  cursor:text;
  box-shadow:0 2px 12px rgba(0,0,0,0.07);
}
.passage-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),transparent);
}

/* ── Viewport: clips to ~5 lines, scrolls internally ── */
.passage-viewport{
  overflow:hidden;
  position:relative;
  height:190px; /* recalculated by JS for exact 5 lines */
}

.passage-text{
  font-size:19px;line-height:1.9;
  font-family:'Sora',sans-serif;
  font-weight:700;
  word-break:normal;
  overflow-wrap:normal;
  user-select:none;
  color:#1a1a2e;
  transition:transform .35s ease;
  will-change:transform;
}
.passage-text.nepali{font-family:'Noto Sans Devanagari',sans-serif;font-size:18px;font-weight:700;}

.char{position:relative;transition:background .08s;}
.char.correct{color:#16a34a;}
.char.wrong{color:#dc2626;background:rgba(220,38,38,.12);border-radius:2px;}
.char.current{
  background:#22c55e;color:#fff;border-radius:3px;
  animation:blink .8s ease-in-out infinite;
}
.char.pending{color:#94a3b8;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Input area (hidden, captures keyboard) ── */
.input-wrap{position:absolute;opacity:0;pointer-events:none;width:0;height:0;overflow:hidden;}
#typing-input{
  width:100%;padding:14px 18px;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius);
  font-family:'Sora',sans-serif;font-size:15px;color:var(--text);
  outline:none;resize:none;
  transition:border-color .2s;
  min-height:56px;
  caret-color:var(--primary);
}
#typing-input.nepali-input{font-family:'Noto Sans Devanagari',sans-serif;}

/* ── Loading state ── */
.loading-text{
  text-align:center;color:#64748b;font-size:14px;padding:20px 0;
}

/* ── Controls — small, one line, evenly spaced ── */
.controls-row{
  display:flex;gap:8px;flex-wrap:nowrap;
}
.btn{
  flex:1;
  padding:9px 10px;border-radius:var(--radius-sm);border:none;
  font-family:'Sora',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;
  white-space:nowrap;
}
.btn svg{flex-shrink:0;width:13px;height:13px;}
.btn-primary{background:var(--primary);color:#000;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,197,94,.35);}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--text2);color:var(--text);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important;}

/* ── Result screen (shown ONLY after time runs out) ── */
#result-screen{display:none;}
.result-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:32px 28px;text-align:center;
  position:relative;overflow:hidden;
}
.result-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--primary),var(--blue),var(--yellow));
}
.result-title{font-size:28px;font-weight:800;margin-bottom:6px;}
.result-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
.result-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
  margin-bottom:28px;text-align:left;
}
.result-stat{
  background:var(--surface2);border-radius:12px;padding:16px;
}
.result-stat-val{font-family:'Space Mono',monospace;font-size:30px;font-weight:700;line-height:1;}
.result-stat-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:6px;}
.result-grade{
  display:inline-block;font-size:56px;margin-bottom:12px;
  animation:pop .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.perf-bar-wrap{margin-bottom:16px;text-align:left;}
.perf-bar-label{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.perf-bar-track{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.perf-bar-fill{height:100%;border-radius:99px;transition:width 1s ease .3s;}

/* ── Error banner ── */
.error-banner{
  background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);
  border-radius:var(--radius-sm);padding:12px 16px;
  font-size:12px;color:var(--red);
  margin-bottom:14px;text-align:center;display:none;
}

/* ── Confetti canvas ── */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999;}

@keyframes pulseGreen{0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}70%{box-shadow:0 0 0 10px transparent}100%{box-shadow:0 0 0 0 transparent}}
.passage-box.active{animation:pulseGreen 1s ease 1;}

/* ── Mobile tweaks ── */
@media (max-width:480px){
  .wrap{padding:14px 12px 24px;}
  .brand-name{font-size:14px;}
  .brand-sub{font-size:9px;}
  .header{gap:6px;margin-bottom:14px;}
  .brand-icon{width:34px;height:34px;}
  .lang-btn{padding:6px 10px;font-size:11px;}
  #sound-toggle{width:30px;height:30px;}
  .passage-box{padding:14px;}
  .passage-text{font-size:16px;line-height:1.85;}
  .passage-text.nepali{font-size:15px;}
  .result-grid{grid-template-columns:repeat(2,1fr);}
  .btn{font-size:11px;padding:9px 6px;}
  .duration-label{display:none;}
}

@media (max-width:360px){
  .header-right{gap:6px;}
  .lang-btn{padding:5px 8px;font-size:10px;}
}
</style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>

<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Shikshit Mitra</div>
        <div class="brand-sub">Typing Practice</div>
      </div>
    </div>
    <div class="header-right">
      <button id="sound-toggle" onclick="toggleSound()" title="Toggle sound">
        <svg id="sound-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('en')" id="btn-en">English</button>
        <button class="lang-btn" onclick="setLang('np')" id="btn-np">नेपाली</button>
      </div>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game-screen">

    <!-- Slim progress bar (green line) -->
    <div class="timer-bar-track"><div class="timer-bar-fill" id="timer-bar"></div></div>

    <!-- Duration row — timer on right side -->
    <div class="duration-row">
      <div class="duration-left">
        <span class="duration-label">Duration:</span>
        <button class="dpill active" onclick="setDuration(60)" id="d60">1 min</button>
        <button class="dpill" onclick="setDuration(300)" id="d300">5 min</button>
        <button class="dpill" onclick="setDuration(600)" id="d600">10 min</button>
      </div>
      <div class="timer-chip">
        <div class="timer-dot" id="timer-dot"></div>
        <div class="timer-display" id="timer-display">1:00</div>
      </div>
    </div>

    <!-- Error banner -->
    <div class="error-banner" id="error-banner">
      ⚠️ Could not load passages from Google Sheets. Check your internet connection and try again.
    </div>

    <!-- Passage — WHITE background, shows ~5 lines at a time -->
    <div class="passage-box" id="passage-box" tabindex="0" onclick="focusInput()">
      <div class="passage-viewport" id="passage-viewport">
        <div class="passage-text" id="passage-display">
          <div class="loading-text">Loading passages…</div>
        </div>
      </div>
    </div>

    <!-- Hidden input -->
    <div class="input-wrap">
      <textarea id="typing-input" rows="1" tabindex="-1" aria-hidden="true"></textarea>
    </div>

    <!-- Controls -->
    <div class="controls-row">
      <button class="btn btn-primary" id="btn-start" onclick="startGame()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start
      </button>
      <button class="btn btn-secondary" id="btn-restart" onclick="restartGame()" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
        Restart
      </button>
      <button class="btn btn-secondary" onclick="newPassage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        New Passage
      </button>
    </div>

  </div><!-- /game-screen -->

  <!-- Result screen — shown ONLY when time runs out -->
  <div id="result-screen">
    <div class="result-card">
      <div class="result-grade" id="result-grade">🎉</div>
      <div class="result-title" id="result-title">Great Job!</div>
      <div class="result-sub" id="result-sub">Here's how you did</div>

      <div class="result-grid">
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--primary)" id="r-wpm">0</div>
          <div class="result-stat-label">WPM</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--blue)" id="r-net">0</div>
          <div class="result-stat-label">Net WPM</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--yellow)" id="r-acc">0%</div>
          <div class="result-stat-label">Accuracy</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--red)" id="r-err">0</div>
          <div class="result-stat-label">Errors</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--text)" id="r-chars">0</div>
          <div class="result-stat-label">Chars Typed</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--text)" id="r-correct">0</div>
          <div class="result-stat-label">Correct</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--text)" id="r-time">0s</div>
          <div class="result-stat-label">Time Used</div>
        </div>
        <div class="result-stat">
          <div class="result-stat-val" style="color:var(--yellow)" id="r-best">0</div>
          <div class="result-stat-label">Best WPM</div>
        </div>
      </div>

      <div class="perf-bar-wrap">
        <div class="perf-bar-label"><span>Speed</span><span id="pb-speed-val">0 WPM</span></div>
        <div class="perf-bar-track"><div class="perf-bar-fill" id="pb-speed" style="background:var(--primary);width:0%"></div></div>
      </div>
      <div class="perf-bar-wrap">
        <div class="perf-bar-label"><span>Accuracy</span><span id="pb-acc-val">0%</span></div>
        <div class="perf-bar-track"><div class="perf-bar-fill" id="pb-acc" style="background:var(--blue);width:0%"></div></div>
      </div>

      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px;">
        <button class="btn btn-primary" onclick="playAgain()" style="flex:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          Play Again
        </button>
        <button class="btn btn-secondary" onclick="newPassageResult()" style="flex:none;">New Passage</button>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<script>
/* ═══════════════════════════════════════
   GOOGLE SHEETS CSV URL
═══════════════════════════════════════ */
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSCjPD_E5TAQIl90ANdWSqGVYfuFv_TNnWPgp-1mUQ9KCWQHu8cmQVMwvQWxLxjZ_Q1jcVWnIVuhYLs/pub?output=csv';

/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let lang = 'en';
let duration = 60;
let timeLeft = 60;
let timerInterval = null;
let gameStarted = false;
let gameOver = false;
let currentPassage = '';
let currentIndex = 0;
let totalTyped = 0;
let correctTyped = 0;
let errorCount = 0;
let startTime = null;
let passageIndex = 0;
let passagesLoaded = false;

// Passages fetched from sheet: { en: [...], np: [...] }
const passages = { en: [], np: [] };

/* ═══════════════════════════════════════
   FETCH PASSAGES FROM GOOGLE SHEETS
   Sheet columns: Language (en/np), Passage
═══════════════════════════════════════ */
async function fetchPassages() {
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('Network error');
    const csv = await res.text();
    const rows = parseCSV(csv);
    passages.en = [];
    passages.np = [];
    // Skip header row (row 0), then parse
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || row.length < 2) continue;
      const langCol = (row[0] || '').trim().toLowerCase();
      const text = (row[1] || '').trim();
      if (!text) continue;
      if (langCol === 'en' || langCol === 'english') passages.en.push(text);
      else if (langCol === 'np' || langCol === 'nepali' || langCol === 'ne') passages.np.push(text);
    }
    // Fallback if no passages found
    if (passages.en.length === 0) passages.en = ['No English passages found. Please add passages to your Google Sheet with language column "en".'];
    if (passages.np.length === 0) passages.np = ['कुनै नेपाली अनुच्छेद फेला परेन। कृपया Google Sheet मा "np" भाषा स्तम्भ सहित अनुच्छेदहरू थप्नुहोस्।'];
    passagesLoaded = true;
    document.getElementById('error-banner').style.display = 'none';
    loadPassage();
  } catch (err) {
    console.error('Failed to load passages:', err);
    document.getElementById('error-banner').style.display = 'block';
    // Show error in passage box
    document.getElementById('passage-display').innerHTML = '<div class="loading-text" style="color:#f85149;">Failed to load passages. Check internet connection.</div>';
  }
}

/* ─ Simple CSV parser ─ */
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = [];
    let inQuote = false;
    let cur = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

/* ═══════════════════════════════════════
   SOUND ENGINE
═══════════════════════════════════════ */
let audioCtx = null;
let soundEnabled = true;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playKeyClick(correct){
  if(!soundEnabled) return;
  try{
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    const bufLen = ctx.sampleRate * 0.045;
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufLen;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,2.5);
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=correct?1800:1100; bp.Q.value=0.8;
    const hs = ctx.createBiquadFilter(); hs.type='highshelf'; hs.frequency.value=4000; hs.gain.value=correct?6:2;
    const ng = ctx.createGain(); ng.gain.setValueAtTime(correct?.28:.22,now); ng.gain.exponentialRampToValueAtTime(0.001,now+0.042);
    noise.connect(bp);bp.connect(hs);hs.connect(ng);ng.connect(ctx.destination);
    noise.start(now);noise.stop(now+0.05);
    const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(correct?680:420,now);osc.frequency.exponentialRampToValueAtTime(correct?320:200,now+0.03);
    const og=ctx.createGain();og.gain.setValueAtTime(correct?.09:.07,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.035);
    osc.connect(og);og.connect(ctx.destination);osc.start(now);osc.stop(now+0.04);
  }catch(e){}
}

function playBackspace(){
  if(!soundEnabled) return;
  try{
    const ctx=getAudioCtx();const now=ctx.currentTime;
    const bufLen=ctx.sampleRate*0.035;const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,3);
    const noise=ctx.createBufferSource();noise.buffer=buf;
    const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;
    const g=ctx.createGain();g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.032);
    noise.connect(lp);lp.connect(g);g.connect(ctx.destination);noise.start(now);noise.stop(now+0.04);
  }catch(e){}
}

function playSpace(){
  if(!soundEnabled) return;
  try{
    const ctx=getAudioCtx();const now=ctx.currentTime;
    const bufLen=ctx.sampleRate*0.06;const buf=ctx.createBuffer(1,bufLen,ctx.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<bufLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bufLen,2);
    const noise=ctx.createBufferSource();noise.buffer=buf;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=0.6;
    const g=ctx.createGain();g.gain.setValueAtTime(0.32,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.055);
    noise.connect(bp);bp.connect(g);g.connect(ctx.destination);noise.start(now);noise.stop(now+0.065);
    const osc=ctx.createOscillator();osc.type='sine';osc.frequency.setValueAtTime(280,now);osc.frequency.exponentialRampToValueAtTime(130,now+0.05);
    const og=ctx.createGain();og.gain.setValueAtTime(0.12,now);og.gain.exponentialRampToValueAtTime(0.001,now+0.05);
    osc.connect(og);og.connect(ctx.destination);osc.start(now);osc.stop(now+0.06);
  }catch(e){}
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
function init(){
  fetchPassages();
  updateTimerDisplay();
  document.getElementById('typing-input').addEventListener('input', onInput);
  document.getElementById('typing-input').addEventListener('keydown', onKeyDown);
  document.addEventListener('keydown', function(e){
    if(e.key==='Tab'){e.preventDefault();restartGame();}
    if(e.key==='Enter' && !gameStarted && !gameOver && passagesLoaded){e.preventDefault();startGame();}
  });
  window.addEventListener('resize', ()=>{ if(passagesLoaded) updateViewportHeight(); });
}

function loadPassage(){
  if(!passagesLoaded) return;
  const pool = passages[lang];
  let newIndex;
  do { newIndex = Math.floor(Math.random() * pool.length); }
  while(pool.length > 1 && newIndex === passageIndex);
  passageIndex = newIndex;
  currentPassage = pool[passageIndex];
  currentIndex = 0; totalTyped = 0; correctTyped = 0; errorCount = 0;
  renderPassage();
}

function renderPassage(){
  const el = document.getElementById('passage-display');
  el.className = 'passage-text' + (lang==='np'?' nepali':'');
  el.style.transform = 'translateY(0px)';
  el.innerHTML = currentPassage.split('').map((ch,i)=>{
    let cls = 'pending';
    if(i<currentIndex) cls='correct';
    if(i===currentIndex) cls='current';
    const safe = ch===' '?'&nbsp;':ch.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<span class="char ${cls}" id="c${i}">${safe}</span>`;
  }).join('');
  updateViewportHeight();
  scrollToCurrent();
}

/* ── Keep the passage viewport fixed to ~5 lines ── */
function getLineHeight(){
  const display = document.getElementById('passage-display');
  const lh = parseFloat(getComputedStyle(display).lineHeight);
  if(!isNaN(lh) && lh > 0) return lh;
  // fallback estimate
  return lang==='np' ? 34 : 36;
}

function updateViewportHeight(){
  const viewport = document.getElementById('passage-viewport');
  const lineHeight = getLineHeight();
  viewport.style.height = (lineHeight * 5) + 'px';
}

/* ── Scroll so current line stays within the last visible line ── */
function scrollToCurrent(){
  const display = document.getElementById('passage-display');
  const span = document.getElementById('c'+currentIndex);
  if(!span) return;
  const lineHeight = getLineHeight();
  const visibleLines = 5;
  const lineIndex = Math.round(span.offsetTop / lineHeight);
  const maxScrollLine = Math.max(0, lineIndex - (visibleLines - 1));
  display.style.transform = `translateY(-${maxScrollLine * lineHeight}px)`;
}

/* ═══════════════════════════════════════
   GAME CONTROLS
═══════════════════════════════════════ */
function focusInput(){
  const inp = document.getElementById('typing-input');
  if(!inp.disabled) inp.focus();
  else if(!gameStarted && !gameOver && passagesLoaded) startGame();
}

function startGame(){
  if(gameStarted || !passagesLoaded) return;
  gameStarted=true;gameOver=false;
  startTime=Date.now();
  timeLeft=duration;
  updateTimerDisplay();
  document.getElementById('typing-input').disabled=false;
  document.getElementById('typing-input').focus();
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-restart').disabled=false;
  document.getElementById('passage-box').classList.add('active');
  timerInterval=setInterval(tick,1000);
  renderPassage();
}

function tick(){
  timeLeft--;
  updateTimerDisplay();
  if(timeLeft<=0) endGame();
}

function updateTimerDisplay(){
  const el=document.getElementById('timer-display');
  const dot=document.getElementById('timer-dot');
  const bar=document.getElementById('timer-bar');
  const m=Math.floor(timeLeft/60);
  const s=timeLeft%60;
  el.textContent=m+':'+(s<10?'0':'')+s;
  const pct=(timeLeft/duration)*100;
  bar.style.width=pct+'%';
  const warn=timeLeft<=duration*0.4;
  const danger=timeLeft<=duration*0.15;
  el.className='timer-display'+(danger?' danger':warn?' warn':'');
  dot.className='timer-dot'+(danger?' danger pulse':warn?' warn':'');
  bar.className='timer-bar-fill'+(danger?' danger':warn?' warn':'');
}

function restartGame(){
  clearInterval(timerInterval);
  gameStarted=false;gameOver=false;
  timeLeft=duration;
  currentIndex=0;totalTyped=0;correctTyped=0;errorCount=0;
  document.getElementById('typing-input').value='';
  document.getElementById('typing-input').disabled=true;
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-restart').disabled=true;
  document.getElementById('game-screen').style.display='';
  document.getElementById('result-screen').style.display='none';
  updateTimerDisplay();
  if(passagesLoaded) renderPassage();
}

function newPassage(){
  restartGame();
  if(passagesLoaded) loadPassage();
}

function endGame(){
  clearInterval(timerInterval);
  gameStarted=false;gameOver=true;
  document.getElementById('typing-input').disabled=true;
  showResult();
}

/* ═══════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════ */
function onKeyDown(e){
  if(!gameStarted) return;
  if(e.key==='Backspace'){
    if(currentIndex>0){
      currentIndex--;
      const span=document.getElementById('c'+currentIndex);
      if(span) span.className='char current';
      const prev=document.getElementById('c'+(currentIndex+1));
      if(prev) prev.className='char pending';
      playBackspace();
      scrollToCurrent();
    }
    e.preventDefault();
    const inp=document.getElementById('typing-input');
    inp.value=inp.value.slice(0,-1);
  }
}

function onInput(e){
  if(!gameStarted||gameOver) return;
  const inp=document.getElementById('typing-input');
  const val=inp.value;
  if(!val.length) return;
  const typed=val[val.length-1];
  inp.value='';

  if(currentIndex>=currentPassage.length){
    loadPassage();return;
  }

  const expected=currentPassage[currentIndex];
  const span=document.getElementById('c'+currentIndex);
  totalTyped++;

  if(typed===expected){
    correctTyped++;
    if(span) span.className='char correct';
    if(typed===' ') playSpace(); else playKeyClick(true);
  } else {
    errorCount++;
    if(span) span.className='char wrong';
    playKeyClick(false);
  }
  currentIndex++;

  const next=document.getElementById('c'+currentIndex);
  if(next) next.className='char current';
  scrollToCurrent();

  if(currentIndex>=currentPassage.length) loadPassage();
}

/* ═══════════════════════════════════════
   STATS
═══════════════════════════════════════ */
function calcStats(){
  const elapsed=gameStarted?(Date.now()-startTime)/60000:(duration/60);
  const minutes=Math.max(elapsed,0.01);
  const wpm=Math.round(correctTyped/5/minutes);
  const errPerMin=errorCount/Math.max((Date.now()-(startTime||Date.now()))/60000,0.01);
  const netWpm=Math.max(0,Math.round(wpm-errPerMin));
  const acc=totalTyped>0?Math.round((correctTyped/totalTyped)*100):100;
  return{wpm,netWpm,acc,errors:errorCount,chars:totalTyped,correct:correctTyped};
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  const icon=document.getElementById('sound-icon');
  const btn=document.getElementById('sound-toggle');
  if(soundEnabled){
    btn.classList.remove('muted');
    icon.innerHTML=`<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
  } else {
    btn.classList.add('muted');
    icon.innerHTML=`<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
  }
}

/* ═══════════════════════════════════════
   RESULT — shown only after time ends
═══════════════════════════════════════ */
function showResult(){
  const s=calcStats();
  const timeUsed=duration-timeLeft;
  const bestKey='sm-best-wpm-'+lang;
  const prev=parseInt(localStorage.getItem(bestKey)||'0');
  const best=Math.max(prev,s.wpm);
  localStorage.setItem(bestKey,best);

  let grade='😐';let title='Keep Practicing!';
  if(s.acc>=95&&s.wpm>=50){grade='🏆';title='Outstanding!';}
  else if(s.acc>=90&&s.wpm>=35){grade='🎉';title='Excellent Work!';}
  else if(s.acc>=85&&s.wpm>=25){grade='👍';title='Good Job!';}
  else if(s.acc>=70){grade='📈';title='Getting Better!';}

  document.getElementById('result-grade').textContent=grade;
  document.getElementById('result-title').textContent=title;
  document.getElementById('result-sub').textContent=lang==='np'?'तपाईंको टाइपिङ परिणाम':'Your typing session results';
  document.getElementById('r-wpm').textContent=s.wpm;
  document.getElementById('r-net').textContent=s.netWpm;
  document.getElementById('r-acc').textContent=s.acc+'%';
  document.getElementById('r-err').textContent=s.errors;
  document.getElementById('r-chars').textContent=s.chars;
  document.getElementById('r-correct').textContent=s.correct;
  document.getElementById('r-time').textContent=timeUsed+'s';
  document.getElementById('r-best').textContent=best;

  setTimeout(()=>{
    const speedPct=Math.min(100,(s.wpm/80)*100);
    document.getElementById('pb-speed').style.width=speedPct+'%';
    document.getElementById('pb-speed-val').textContent=s.wpm+' WPM';
    document.getElementById('pb-acc').style.width=s.acc+'%';
    document.getElementById('pb-acc-val').textContent=s.acc+'%';
  },100);

  document.getElementById('game-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  window.scrollTo(0,0);

  if(s.wpm>=35&&s.acc>=85) launchConfetti();
}

function playAgain(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game-screen').style.display='';
  restartGame();
}
function newPassageResult(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('game-screen').style.display='';
  newPassage();
}

/* ═══════════════════════════════════════
   LANGUAGE / DURATION
═══════════════════════════════════════ */
function setLang(l){
  lang=l;
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-np').classList.toggle('active',l==='np');
  const inp=document.getElementById('typing-input');
  inp.className=l==='np'?'nepali-input':'';
  restartGame();
  if(passagesLoaded) loadPassage();
}

function setDuration(sec){
  duration=sec;timeLeft=sec;
  [60,300,600].forEach(x=>document.getElementById('d'+x).classList.toggle('active',x===sec));
  restartGame();
}

/* ═══════════════════════════════════════
   CONFETTI
═══════════════════════════════════════ */
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:-20,
    w:6+Math.random()*8,h:10+Math.random()*6,
    color:['#22c55e','#58a6ff','#e3b341','#f85149','#c084fc'][Math.floor(Math.random()*5)],
    vx:(Math.random()-.5)*4,vy:2+Math.random()*4,
    rot:Math.random()*360,vr:(Math.random()-.5)*8,alpha:1
  }));
  let frame;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=0;
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
      if(p.y>canvas.height*.6) p.alpha-=0.02;
      if(p.alpha>0){alive++;
        ctx.save();ctx.globalAlpha=p.alpha;
        ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
    });
    if(alive>0) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
  setTimeout(()=>{cancelAnimationFrame(frame);ctx.clearRect(0,0,canvas.width,canvas.height);},4000);
}

/* ── Start ── */
init();
</script>
